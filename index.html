<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Fake Google Calculator Tab -->
<title>calculator - Google Search</title>
<link rel="icon" href="/images/google.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0b;
      --bg-2: #121212;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.52);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --panel: rgba(18, 18, 18, 0.92);
      --panel-border: rgba(255,255,255,0.10);
      --sweep-a: rgba(255,255,255,0.00);
      --sweep-b: rgba(180,255,230,0.18);
      --sweep-c: rgba(255,255,255,0.85);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(122, 255, 202, 0.03), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px 22px;
    }

    .shell {
      width: min(920px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .brand {
      margin: 0;
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.4rem, 9vw, 7.2rem);
      line-height: 0.9;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
      transform: translateY(2px);
      user-select: none;
    }

    .apps {
      width: min(480px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 12px;
    }

    .app {
      pointer-events: auto;
      height: 112px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(28, 28, 28, 0.8);
      box-shadow: var(--shadow);
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      font: inherit;
    }

    .app:hover {
      transform: translateY(-4px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.88);
    }

    .app-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      color: white;
      background: rgba(255,255,255,0.08);
    }

    .app-label {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.92);
    }

    .v5 {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: 50%;
      pointer-events: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.38);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
      transform-origin: center center;
      user-select: none;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .modal.show {
      display: flex;
    }

    .modal-panel {
      width: min(700px, 100%);
      max-height: min(78vh, 760px);
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(18, 18, 18, 0.98);
    }

    .modal-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .modal-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .close-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .close-btn:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,0.09);
    }

    .modal-body {
      overflow: auto;
      padding: 18px;
    }

    .sticky-note {
      position: sticky;
      top: 0;
      z-index: 2;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(122,255,202,0.22);
      background: rgba(122,255,202,0.08);
      color: #eafff7;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: lowercase;
    }

    .note-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note {
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      text-align: left;
    }

    .note-date {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .note-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.86);
      line-height: 1.5;
    }

    /* sweep animation */
    .sweep {
      position: fixed;
      inset: 0;
      z-index: 18;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
      background: rgba(0,0,0,0.04);
    }

    .sweep::before,
    .sweep::after {
      content: "";
      position: absolute;
      inset: -35%;
      transform: translateX(-160%) skewX(-20deg);
      will-change: transform, opacity;
    }

    .sweep::before {
      background: linear-gradient(
        115deg,
        var(--sweep-a) 0%,
        var(--sweep-a) 38%,
        rgba(255,255,255,0.03) 44%,
        var(--sweep-b) 50%,
        var(--sweep-c) 52%,
        var(--sweep-b) 55%,
        rgba(255,255,255,0.03) 60%,
        var(--sweep-a) 66%,
        var(--sweep-a) 100%
      );
      filter: blur(1px);
    }

    .sweep::after {
      inset: -20%;
      background: radial-gradient(circle at center, rgba(180,255,230,0.22), transparent 55%);
      transform: translateX(-180%) scale(0.9) skewX(-18deg);
      filter: blur(12px);
      opacity: 0.85;
    }

    .sweep.run {
      opacity: 1;
    }

  .sweep.run::before {
  animation: sweepAcross 1900ms ease forwards;
}

.sweep.run::after {
  animation: sweepGlow 1900ms ease forwards;
}

@keyframes sweepAcross {
  0%   { transform: translateX(-160%) skewX(-20deg); opacity: 0; }
  15%  { opacity: 1; }
  55%  { opacity: 1; }
  100% { transform: translateX(160%) skewX(-20deg); opacity: 0; }
}

@keyframes sweepGlow {
  0%   { transform: translateX(-180%) scale(0.9) skewX(-18deg); opacity: 0; }
  18%  { opacity: 1; }
  100% { transform: translateX(180%) scale(1.1) skewX(-18deg); opacity: 0; }
}

    @media (max-width: 700px) {
      .page { padding-top: 72px; padding-bottom: 72px; }
      .shell { gap: 18px; }
      .apps { width: min(360px, 100%); }
      .app { height: 96px; }
      .modal-panel { max-height: 84vh; }
    }
    .cat-scare {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: none;
  align-items: center;
  justify-content: center;
  background: #000;
}

.cat-scare.show {
  display: flex;
}

#catImage {
  width: min(92vw, 980px);
  height: min(92vh, 980px);
  object-fit: contain;
  transform-origin: center center;
  filter: drop-shadow(0 0 22px rgba(255,255,255,0.12));
}

#catImage.shrink-spin {
  animation: catShrinkSpin 900ms ease-in forwards;
}

@keyframes catShrinkSpin {
  0% {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: scale(0.05) rotate(2160deg);
    opacity: 0;
  }
}
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>

  <div class="v5" id="v5">v5</div>
  <div class="sweep" id="sweep"></div>
  <div class="cat-scare" id="catScare" aria-hidden="true">
  <img src="images/cat.png" alt="cat jumpscare" id="catImage">
</div>

  <main class="page">
    <section class="shell" aria-label="Velora home">
      <h1 class="brand">Velora</h1>

      <div class="apps">
        <a class="app" href="g.html">
          <div class="app-icon">▣</div>
          <div class="app-label">Games</div>
        </a>

        <a class="app" href="m.html">
          <div class="app-icon">▤</div>
          <div class="app-label">Movies</div>
        </a>

        <button class="app" id="patchBtn" type="button">
          <div class="app-icon">✦</div>
          <div class="app-label">Patch Notes</div>
        </button>

        <button class="app" id="catBtn" type="button">
  <div class="app-icon">◉</div>
  <div class="app-label">Cat</div>
</button>
        </a>
      </div>
    </section>
  </main>

  <div class="modal" id="patchModal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="patchTitle">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 class="modal-title" id="patchTitle">Patch Notes</h2>
          <div class="modal-subtitle">Velora timeline and updates</div>
        </div>
        <button class="close-btn" id="closePatchBtn" type="button" aria-label="Close patch notes">×</button>
      </div>

      <div class="modal-body">
        <div class="sticky-note">new updates underway</div>
        <div class="note-list" id="patchList"></div>
      </div>
    </div>
  </div>

  <script>
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');
    const v5 = document.getElementById('v5');
    const sweep = document.getElementById('sweep');

    const patchBtn = document.getElementById('patchBtn');
    const patchModal = document.getElementById('patchModal');
    const closePatchBtn = document.getElementById('closePatchBtn');
    const patchList = document.getElementById('patchList');






















    
    // Easy to edit: add new patch notes here.
    const PATCH_NOTES = [
      {
        date: "april 23, 2026",
        text: "movies added, huge fullscreen revamp — V5.11"
      },
      {
        date: "april 23, 2026",
        text: "ui & fullscreen update — V5.01"
      },
      {
        date: "april 22, 2026",
        text: "V5 created — V5.0"
      },
      {
        date: "march 2025",
        text: "Velora V4 released — breakthrough"
      },
      {
        date: "january 2025",
        text: "V3 released — Velora gets its name"
      },
      {
        date: "may 2024",
        text: "Velora V2 released — experimental"
      },
      {
        date: "february 2024",
        text: "Velora V1 released"
      }
    ];


    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    let W = 0, H = 0;
    let stars = [];
    let sweepTimer = null;

    function placeV5() {
      const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
      const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
      v5.style.left = `${x}px`;
      v5.style.top = `${y}px`;
    }

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
      placeV5();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          tw: Math.random() * 0.02 + 0.005,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;

        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));

        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';

      const maxD = Math.max(110, Math.min(240, (W + H) / 12));

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        let matches = [];
        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }
        matches.sort((a, b) => a.d - b.d);

        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }

      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    function renderPatchNotes() {
      patchList.innerHTML = PATCH_NOTES.map(note => `
        <div class="note">
          <span class="note-date">${note.date}</span>
          <div class="note-text">${note.text}</div>
        </div>
      `).join('');
    }

    function openPatchNotes() {
      renderPatchNotes();
      patchModal.classList.add('show');
      patchModal.setAttribute('aria-hidden', 'false');
    }

    function closePatchNotes() {
      patchModal.classList.remove('show');
      patchModal.setAttribute('aria-hidden', 'true');
    }

    function playSweep(callback) {
      if (sweepTimer) clearTimeout(sweepTimer);

      sweep.classList.remove('run');
      void sweep.offsetWidth;
      sweep.classList.add('run');

      sweepTimer = window.setTimeout(() => {
        sweep.classList.remove('run');
        if (typeof callback === 'function') callback();
      }, 700);
    }

    patchBtn.addEventListener('click', openPatchNotes);
    closePatchBtn.addEventListener('click', closePatchNotes);

    patchModal.addEventListener('click', (e) => {
      if (e.target === patchModal) closePatchNotes();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePatchNotes();
    });

    document.querySelectorAll('.app[href]').forEach((link) => {
      link.addEventListener('click', (e) => {
        if (link.id === 'patchBtn') return;

        e.preventDefault();
        const href = link.getAttribute('href');
        playSweep(() => {
          window.location.href = href;
        });
      });
    });

    window.addEventListener('resize', resize);
    resize();
    animate();

    // page open sweep
    window.addEventListener('load', () => {
      playSweep();
    });

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      stars.forEach(s => { s.vx = 0; s.vy = 0; });
    }
  </script>
</body>
</html>
