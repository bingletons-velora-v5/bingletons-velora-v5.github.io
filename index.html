<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --bg-2: #121212;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.52);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(122, 255, 202, 0.03), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; pointer-events: none; }
    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px 22px;
    }

    .shell {
      width: min(920px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .brand {
      margin: 0;
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.4rem, 9vw, 7.2rem);
      line-height: 0.9;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
      transform: translateY(2px);
      user-select: none;
    }

    .apps {
      width: min(480px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 12px;
    }

    .app {
      pointer-events: auto;
      height: 112px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(28, 28, 28, 0.8);
      box-shadow: var(--shadow);
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .app:hover {
      transform: translateY(-4px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.88);
    }

    .app-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      color: white;
      background: rgba(255,255,255,0.08);
    }

    .app-label {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.92);
    }

    .v5 {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: 50%;
      pointer-events: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.38);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
      transform-origin: center center;
      user-select: none;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (max-width: 700px) {
      .page { padding-top: 72px; padding-bottom: 72px; }
      .shell { gap: 18px; }
      .apps { width: min(360px, 100%); }
      .app { height: 96px; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>
  <div class="v5" id="v5">v5</div>

  <main class="page">
    <section class="shell" aria-label="Velora home">
      <h1 class="brand">Velora</h1>

      <div class="apps">
        <a class="app" href="g.html">
          <div class="app-icon">▣</div>
          <div class="app-label">Games</div>
        </a>
        <a class="app" href="m.html">
          <div class="app-icon">▤</div>
          <div class="app-label">Movies</div>
        </a>
        <a class="app" href="p.html">
          <div class="app-icon">✦</div>
          <div class="app-label">Patch Notes</div>
        </a>
        <a class="app" href="c.html">
          <div class="app-icon">◔</div>
          <div class="app-label">Chat</div>
        </a>
      </div>
    </section>
  </main>

  <script>
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');
    const v5 = document.getElementById('v5');

    let W = 0, H = 0;
    let stars = [];

    function placeV5() {
      const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
      const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
      v5.style.left = `${x}px`;
      v5.style.top = `${y}px`;
    }

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
      placeV5();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          tw: Math.random() * 0.02 + 0.005,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));
        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';

      const maxD = Math.max(110, Math.min(240, (W + H) / 12));

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        let matches = [];
        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }
        matches.sort((a, b) => a.d - b.d);

        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }

      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      stars.forEach(s => { s.vx = 0; s.vy = 0; });
    }
  </script>
</body>
</html>
