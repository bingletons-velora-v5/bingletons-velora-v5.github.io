<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trash Ramp City — Upgraded</title>
<style>
  html,body{height:100%;margin:0;background:#05070d;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
  canvas{display:block;width:100vw;height:100vh}
  .hud{
    position:fixed;left:12px;top:12px;color:#fff;font-size:13px;line-height:1.4;
    padding:10px 12px;border-radius:12px;background:rgba(0,0,0,.18);backdrop-filter:blur(6px);
    text-shadow:0 2px 8px rgba(0,0,0,.8);pointer-events:none;
  }
  .touch {
    position:fixed;right:12px;bottom:12px;display:flex;gap:8px;pointer-events:auto;
  }
  .btn {
    width:64px;height:64px;border-radius:12px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
    user-select:none;touch-action:none;
  }
  .controls { position:fixed; left:50%; transform:translateX(-50%); bottom:10px; display:flex; gap:10px; }
  .small{width:44px;height:44px;font-size:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">
  Drive: A/D or ←/→ &nbsp; Jump: Space/W/↑ &nbsp; Reset: R
  <div id="msg" style="margin-top:6px;color:#ffdca3;font-weight:700">Floor it.</div>
</div>

<div class="controls" id="touchControls" style="display:none;pointer-events:auto">
  <div class="btn small" id="leftBtn">◀</div>
  <div class="btn small" id="jumpBtn">▲</div>
  <div class="btn small" id="rightBtn">▶</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let W=0,H=0,DPR=1;
  function resize(){ DPR = Math.max(1, Math.min(2, devicePixelRatio||1)); W = innerWidth; H = innerHeight; canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR); canvas.style.width = W+'px'; canvas.style.height = H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
  addEventListener('resize', resize);
  resize();

  const CHUNK_W = 720;
  const BASE_Y = 720;

  const state = {
    chunks: new Map(),
    debris: [],
    particles: [],
    lampPosts: [],
    cameraX:0, cameraY:0, shake:0, t:0, score:0, distance:0, message:'Floor it.', messageTimer:180, gameOver:false
  };

  const car = {
    x:140, y:0, vx:0, vy:0, angle:0, angVel:0, w:118, h:44, onGround:false,
    suspension: 0, // shock compression visual
  };

  // input
  const keys = {};
  let jumpQueued = false;
  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
    if (k === ' ' || k === 'w' || k === 'arrowup') jumpQueued = true;
    if (k === 'r') doReset();
  }, { passive:false });
  addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  // simple touch buttons
  const controlsEl = document.getElementById('touchControls');
  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const jumpBtn = document.getElementById('jumpBtn');
  function showTouch() { controlsEl.style.display = 'flex'; }
  function hideTouch() { controlsEl.style.display = 'none'; }
  function bindTouch(el, downCb, upCb){
    let active=false;
    const start=(e)=>{ active=true; downCb(); e.preventDefault(); };
    const end=(e)=>{ if(active){ active=false; upCb(); } e.preventDefault(); };
    el.addEventListener('pointerdown', start);
    window.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
    el.addEventListener('pointerleave', end);
  }
  bindTouch(leftBtn, ()=> keys['a']=true, ()=> keys['a']=false);
  bindTouch(rightBtn, ()=> keys['d']=true, ()=> keys['d']=false);
  bindTouch(jumpBtn, ()=> jumpQueued = true, ()=>{});

  // utilities
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function lerp(a,b,t){return a+(b-a)*t;}
  function smoothstep(t){t=clamp(t,0,1); return t*t*(3-2*t);}
  function rectsOverlap(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
  function mulberry32(seed){ return function(){ let t = seed += 0x6D2B79F5; t = Math.imul(t ^ t>>>15, t | 1); t ^= t + Math.imul(t ^ t>>>7, t | 61); return ((t ^ t>>>14) >>> 0) / 4294967296; }; }
  function randFromIndex(i){ return mulberry32((i*2654435761)>>>0); }

  // world generation
  function getChunk(i){
    let existing = state.chunks.get(i);
    if (existing) return existing;
    const r = randFromIndex(i+1337);
    const features = [];
    const buildings = [];
    const pedestrians = [];
    // mixture of trash heaps and ramps
    const typeRoll = r();
    if (typeRoll < 0.54){
      const count = 1 + Math.floor(r()*2);
      for(let n=0;n<count;n++){
        const x1 = i*CHUNK_W + 120 + r()*360;
        const w = 170 + r()*220; const amp = 85 + r()*170;
        features.push({type:'trash', x1, x2:x1+w, amp});
      }
    } else if (typeRoll < 0.86){
      const x1 = i*CHUNK_W + 80 + r()*420;
      const w = 190 + r()*160; const amp = 60 + r()*100;
      features.push({type:'ramp', x1, x2:x1+w, amp});
    }
    // buildings
    const buildingCount = 2 + Math.floor(r()*4);
    let cursor = i*CHUNK_W + 80;
    for(let n=0;n<buildingCount;n++){
      const bw = 70 + Math.floor(r()*105);
      const gap = 28 + r()*72; cursor += gap;
      const bx = cursor; const bh = 120 + Math.floor(r()*260);
      const bhp = 90 + Math.floor(r()*90);
      buildings.push({x:bx,w:bw,h:bh,hp:bhp,destroyed:false,seed:(r()*1e9)|0});
      cursor += bw;
      if (cursor > (i+1)*CHUNK_W - 180) break;
    }
    // pedestrians
    const pedCount = 2 + Math.floor(r()*4);
    for(let n=0;n<pedCount;n++){
      const px = i*CHUNK_W + 90 + r()*(CHUNK_W-180);
      pedestrians.push(makePedestrian(px));
    }
    const chunk = {features, buildings, pedestrians};
    state.chunks.set(i, chunk);
    return chunk;
  }

  function groundBase(x){
    return BASE_Y
      + Math.sin(x*0.00115)*34
      + Math.sin(x*0.0037+1.8)*20
      + Math.sin(x*0.0091+0.4)*9
      + Math.sin(x*0.00022)*12;
  }

  function groundY(x){
    let y = groundBase(x);
    const i = Math.floor(x/CHUNK_W);
    for(let k=-1;k<=1;k++){
      const c = getChunk(i+k);
      for(const f of c.features){
        const p = (x - f.x1) / (f.x2 - f.x1);
        if (p >= 0 && p <= 1){
          const bump = Math.sin(Math.PI * p);
          const lift = f.type === 'trash' ? f.amp : f.amp * 0.72;
          y -= lift * bump;
        }
      }
    }
    return y;
  }

  function slopeAt(x){
    return Math.atan2(groundY(x+10)-groundY(x-10), 20);
  }

  function buildingRect(b){
    const y = groundY(b.x + b.w*0.5) - b.h;
    return { x: b.x, y, w: b.w, h: b.h };
  }

  function makePedestrian(x){
    const y = groundY(x) - 2;
    const r = mulberry32(((x*99991)|0) ^ 0x1234);
    const dir = r() < 0.5 ? -1 : 1;
    return { x, y, dir, walk: r()*Math.PI*2, alive:true, ragdoll:false, speed:0.3 + r()*0.5, parts:null };
  }

  function spawnRagdoll(ped, impactVX=0){
    const x = ped.x, y = ped.y - 18, vx = impactVX, vy = -4;
    ped.alive = false; ped.ragdoll = true;
    ped.parts = {
      head: {x, y:y-26, vx: vx*0.25, vy: vy-2, r:7},
      torso:{x, y:y-10, vx: vx*0.30, vy: vy-1, r:10},
      handL:{x:x-12,y:y-9, vx: vx*0.15-1.2, vy:vy, r:4},
      handR:{x:x+12,y:y-9, vx: vx*0.15+1.2, vy:vy, r:4},
      footL:{x:x-8, y:y+16,vx: vx*0.1-0.8, vy: vy+1.2, r:4},
      footR:{x:x+8, y:y+16,vx: vx*0.1+0.8, vy: vy+1.2, r:4}
    };
  }

  function spawnDebris(x,y,count=18,color1='#7a4d25',color2='#999999'){
    for(let i=0;i<count;i++){
      state.debris.push({
        x,y,
        vx:(Math.random()-0.5)*13,
        vy:-Math.random()*10-2,
        w:4+Math.random()*8,
        h:4+Math.random()*8,
        rot:Math.random()*Math.PI*2,
        vr:(Math.random()-0.5)*0.5,
        life:50+Math.random()*55,
        color: Math.random() < 0.5 ? color1 : color2
      });
    }
    state.shake = Math.min(30, state.shake + 10);
  }

  function addParticles(x,y,color,count=10){
    for(let i=0;i<count;i++){
      state.particles.push({ x,y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2, r:1.5+Math.random()*3, life:25+Math.random()*20, color });
    }
  }

  function updatePedestrian(ped){
    if (!ped.alive && !ped.ragdoll) return;
    if (ped.ragdoll){
      const parts = ped.parts;
      const list = Object.values(parts);
      for(const p of list){
        p.vy += 0.34;
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.992; p.vy *= 0.992;
        const gy = groundY(p.x) - p.r;
        if (p.y > gy){ p.y = gy; p.vy *= -0.18; p.vx *= 0.86; }
      }
      // link constraints
      const links = [['head','torso',18],['torso','handL',18],['torso','handR',18],['torso','footL',26],['torso','footR',26]];
      for(let iter=0; iter<4; iter++){
        for(const [aKey,bKey,dist] of links){
          const a = parts[aKey], b = parts[bKey];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.hypot(dx,dy) || 1;
          const diff = (d - dist) / d;
          const ox = dx*0.5*diff, oy = dy*0.5*diff;
          a.x += ox; a.y += oy; b.x -= ox; b.y -= oy;
        }
      }
      return;
    }
    const run = ped.speed * ped.dir;
    ped.walk += 0.06 + Math.abs(run)*0.01;
    ped.x += run; ped.y = groundY(ped.x) - 2;
    if (Math.random() < 0.008) ped.dir *= -1;
  }

  function carRect(){
    return { x: car.x - car.w*0.5, y: car.y - car.h*0.5, w: car.w, h: car.h };
  }

  // improved physics parameters
  const PH = {
    maxSpeed: 28,
    accelGround: 0.38,
    accelAir: 0.14,
    gravity: 0.42,
    jumpBase: 12.5,
    angularDamping: 0.985,
    suspensionK: 0.12,
    suspensionD: 0.08
  };

  function update(){
    state.t++;
    state.distance = Math.max(state.distance, Math.floor(car.x/10));
    const right = keys['d'] || keys['arrowright'];
    const left = keys['a'] || keys['arrowleft'];
    const throttle = (right?1:0) - (left?1:0);

    // suspension: sample ground under two wheel points and compute spring
    const wheelFL = car.x - 34; // left wheel world x
    const wheelFR = car.x + 34; // right wheel
    const groundFL = groundY(wheelFL) - 28;
    const groundFR = groundY(wheelFR) - 28;
    const carBaseY = (groundFL + groundFR)*0.5;
    // vertical spring toward carBaseY
    const targetY = carBaseY - 34;
    const dy = targetY - car.y;
    const springForce = dy * PH.suspensionK - car.vy * PH.suspensionD;
    car.vy += springForce;

    // drive
    const accel = car.onGround ? PH.accelGround : PH.accelAir;
    car.vx += throttle * accel;
    if (car.onGround) { car.vx *= 0.986; if (Math.abs(throttle) < 0.01) car.vx *= 0.992; }
    else car.vx *= 0.997;

    // clamp
    car.vx = clamp(car.vx, -PH.maxSpeed, PH.maxSpeed);
    car.vy = clamp(car.vy, -24, 24);

    // jump
    if (jumpQueued){
      if (car.onGround){
        const extra = Math.min(6, Math.abs(car.vx)*0.28);
        car.vy = - (PH.jumpBase + extra);
        car.onGround = false;
        state.message = 'Launch!';
        state.messageTimer = 80;
        addParticles(car.x, car.y+28, 'rgba(255,255,255,.65)', 10);
      }
      jumpQueued = false;
    }

    // integrate
    car.x += car.vx;
    car.y += car.vy;

    // ground collision
    const gy = groundY(car.x);
    const targetGroundY = gy - 62;
    if (car.y >= targetGroundY){
      // landing impact
      if (!car.onGround && car.vy > 6){
        state.shake = Math.min(36, state.shake + Math.min(14, car.vy*0.5));
      }
      car.y = targetGroundY;
      car.vy = 0;
      // orient to slope
      const s = slopeAt(car.x);
      car.angle = lerp(car.angle, s, 0.16);
      car.onGround = true;
      car.vx += Math.sin(s) * 0.08;
      // damp angular velocity on landing
      car.angVel *= 0.6;
    } else {
      car.onGround = false;
      car.angVel *= PH.angularDamping;
      car.angle += car.angVel;
      car.angle = lerp(car.angle, car.angle + car.vx*0.0035, 0.03);
    }

    // camera follow
    state.cameraX += ((car.x - W*0.34) - state.cameraX)*0.08;
    state.cameraY += ((car.y - H*0.56) - state.cameraY)*0.08;

    // load nearby chunks and process collisions
    const cIndex = Math.floor(car.x / CHUNK_W);
    for (let ci = cIndex - 2; ci <= cIndex + 2; ci++){
      const chunk = getChunk(ci);

      // buildings
      for (const b of chunk.buildings){
        if (b.destroyed) continue;
        const br = buildingRect(b);
        const cr = carRect();
        if (rectsOverlap(cr, br)){
          const impact = Math.abs(car.vx) + Math.abs(car.vy)*0.75;
          if (impact > 2.6){
            b.hp -= impact * 12;
            car.vx *= 0.68;
            car.vy -= Math.min(6, impact*0.15);
            car.angVel += (Math.random()-0.5)*0.12 + Math.sign(car.vx)*0.02;
            state.shake = Math.min(36, state.shake + impact*0.5);
            addParticles(car.x, car.y, 'rgba(255,220,150,.9)', 16);
            if (b.hp <= 0){
              b.destroyed = true;
              state.score++;
              state.message = 'Building down.';
              state.messageTimer = 120;
              spawnDebris(br.x + br.w*0.5, br.y + br.h*0.45, 28);
            } else {
              state.message = 'Crunch.';
              state.messageTimer = 60;
              spawnDebris(br.x + (Math.random()-0.5)*br.w*0.5, br.y + br.h*0.5, 8);
            }
          } else {
            // small nudge
            if (car.x < br.x + br.w*0.5) car.x = br.x - car.w*0.5 - 1; else car.x = br.x + br.w + car.w*0.5 + 1;
            car.vx *= -0.18;
          }
        }
      }

      // lamp posts / signs - smaller breakables
      if (!state.lampPosts[ci]) {
        // spawn a few near this chunk (only once)
        const r = randFromIndex(ci+777);
        const count = Math.floor(r()*3);
        state.lampPosts[ci] = [];
        for(let p=0;p<count;p++){
          const px = ci*CHUNK_W + 120 + r()* (CHUNK_W - 240);
          const gy2 = groundY(px);
          state.lampPosts[ci].push({ x: px, y: gy2 - 48, hp: 18, destroyed:false });
        }
      }
      const posts = state.lampPosts[ci] || [];
      for(const post of posts){
        if (post.destroyed) continue;
        const dx = Math.abs(car.x - post.x);
        const dy = Math.abs(car.y - post.y);
        if (dx < 56 && dy < 44){
          const impact = Math.abs(car.vx);
          if (impact > 3.0){
            post.hp -= impact * 6;
            car.vx *= 0.85;
            state.shake = Math.min(20, state.shake + impact*0.5);
            addParticles(post.x, post.y, 'rgba(255,255,255,.8)', 8);
            if (post.hp <= 0){
              post.destroyed = true;
              spawnDebris(post.x, post.y, 10, '#c9c9c9', '#ffd07a');
              state.message = 'Sign down';
              state.messageTimer = 80;
            }
          }
        }
      }

      // pedestrians
      for (const ped of chunk.pedestrians){
        updatePedestrian(ped);
        if (ped.alive){
          const dx = Math.abs(car.x - ped.x);
          const dy = Math.abs(car.y - ped.y);
          if (dx < 54 && dy < 44){
            spawnRagdoll(ped, car.vx);
            car.vx *= 0.88;
            car.angVel += (Math.random()-0.5)*0.08;
            state.shake = Math.min(22, state.shake + 8);
            state.message = 'Dummy hit.';
            state.messageTimer = 70;
            addParticles(ped.x, ped.y-20, 'rgba(255,255,255,.7)', 12);
          }
        } else if (ped.ragdoll){
          const parts = ped.parts;
          const dx = car.x - parts.torso.x;
          const dy = car.y - parts.torso.y;
          if (Math.hypot(dx,dy) < 80 && Math.abs(car.vx) > 4){
            parts.torso.vx += car.vx * 0.15;
            parts.torso.vy -= 2;
          }
        }
      }
    }

    // update debris
    for(const d of state.debris){
      d.vy += 0.34;
      d.x += d.vx; d.y += d.vy; d.rot += d.vr;
      d.vx *= 0.994; d.vy *= 0.994;
      d.life -= 1;
    }
    state.debris = state.debris.filter(d => d.life > 0);

    // particles
    for(const p of state.particles){
      p.vy += 0.15; p.x += p.vx; p.y += p.vy; p.life -= 1;
    }
    state.particles = state.particles.filter(p => p.life > 0);

    // shake & messages
    if (state.shake > 0) state.shake *= 0.9;
    if (state.messageTimer > 0) state.messageTimer--;
    if (state.messageTimer === 0 && !state.gameOver) state.message = 'Floor it.';

    // reset if car falls away
    if (car.y > 1800) doReset();
  }

  // render functions
  function drawBackground(){
    // sky gradient
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#071026'); sky.addColorStop(0.55,'#11162e'); sky.addColorStop(1,'#04050a');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    // sun/glow
    const mx = W*0.78, my = H*0.16;
    const glow = ctx.createRadialGradient(mx,my,0,mx,my,240);
    glow.addColorStop(0,'rgba(255,235,200,.42)'); glow.addColorStop(0.35,'rgba(255,210,150,.12)'); glow.addColorStop(1,'rgba(255,210,150,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(mx,my,220,0,Math.PI*2); ctx.fill();

    // distant skyline parallax
    const par = -state.cameraX*0.06;
    ctx.save(); ctx.translate(par%480,0);
    for(let i=-2;i<20;i++){
      const x = i*320; const h = 40 + (i%6)*14 + Math.sin(i*1.7 + state.t*0.006)*12;
      ctx.fillStyle = 'rgba(18,22,36,.96)'; ctx.fillRect(x, H*0.52 - h, 180, h);
    }
    ctx.restore();

    // stars / atmosphere
    for(let i=0;i<80;i++){
      const sx = ((i*191 + state.cameraX*0.04) % (W+200)) - 100;
      const sy = 30 + (i*53 % 220) + Math.sin(i*2.3 + state.t*0.01)*2;
      ctx.fillStyle = `rgba(255,255,255,${0.12 + (i%7)*0.04})`;
      ctx.fillRect(sx, sy, 1.2, 1.2);
    }
  }

  function drawTerrainAndCity(){
    const left = state.cameraX - 160; const right = state.cameraX + W + 160;
    const step = 18;
    const pts = [];
    for(let x=left; x<=right; x += step) pts.push({ x: x - state.cameraX, y: groundY(x) - state.cameraY });

    // ground bulk
    ctx.save();
    ctx.beginPath(); ctx.moveTo(pts[0].x, H+120);
    for(const p of pts) ctx.lineTo(p.x, p.y);
    ctx.lineTo(pts[pts.length-1].x, H+120);
    ctx.closePath();
    const g = ctx.createLinearGradient(0,H*0.48,0,H);
    g.addColorStop(0,'#2c2630'); g.addColorStop(1,'#08080b');
    ctx.fillStyle = g; ctx.fill();

    // sheen line
    ctx.strokeStyle = 'rgba(200,230,255,.08)'; ctx.lineWidth = 1;
    ctx.beginPath(); for(let i=0;i<pts.length-1;i++){ const a=pts[i], b=pts[i+1]; ctx.moveTo(a.x, a.y-3); ctx.lineTo(b.x, b.y-3); } ctx.stroke();
    ctx.restore();

    // features
    const i0 = Math.floor(left/CHUNK_W)-1, i1 = Math.floor(right/CHUNK_W)+1;
    for(let ci=i0; ci<=i1; ci++){
      const chunk = getChunk(ci);
      for(const f of chunk.features){
        const x1s = f.x1 - state.cameraX;
        const x2s = f.x2 - state.cameraX;
        const y1 = groundY(f.x1) - state.cameraY;
        const y2 = groundY(f.x2) - state.cameraY;
        const mid = (f.x1 + f.x2) * 0.5;
        const ym = groundY(mid) - state.cameraY - f.amp * (f.type==='trash'?0.92:0.72);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x1s, y1);
        // fixed control point usage: control point must be in same screen space as x1s/x2s
        ctx.quadraticCurveTo((x1s + x2s)*0.5, ym, x2s, y2);
        ctx.lineTo(x2s, H+80); ctx.lineTo(x1s, H+80); ctx.closePath();

        if (f.type === 'trash'){
          const grad = ctx.createLinearGradient(0, ym, 0, y2);
          grad.addColorStop(0, '#7b5f46'); grad.addColorStop(1, '#2f241c');
          ctx.fillStyle = grad;
        } else {
          const grad = ctx.createLinearGradient(0, ym, 0, y2);
          grad.addColorStop(0, '#596674'); grad.addColorStop(1, '#1f2534');
          ctx.fillStyle = grad;
        }
        ctx.fill();
        ctx.restore();
      }

      // buildings
      for(const b of chunk.buildings){
        const br = buildingRect(b);
        const x = br.x - state.cameraX, y = br.y - state.cameraY, w = br.w, h = br.h;
        if (x + w < -160 || x > W + 160) continue;
        ctx.save();
        if (b.destroyed){
          ctx.globalAlpha = 0.38;
          ctx.fillStyle = '#3a2d23';
          ctx.fillRect(x, y + h*0.62, w, h*0.38);
          ctx.restore();
          continue;
        }
        // shadow side
        ctx.fillStyle = 'rgba(0,0,0,.22)';
        ctx.beginPath(); ctx.moveTo(x+w,y); ctx.lineTo(x+w+12,y-12); ctx.lineTo(x+w+12,y+h-12); ctx.lineTo(x+w,y+h); ctx.closePath(); ctx.fill();
        // face
        const face = ctx.createLinearGradient(x,y,x+w,y+h);
        // variety: tint based on seed
        const tint = ((b.seed % 3) === 0) ? ['#48586e','#1c2130'] : ((b.seed%3)===1 ? ['#3f4a5e','#1b2330'] : ['#4a3a3a','#15181b']);
        face.addColorStop(0, tint[0]); face.addColorStop(1, tint[1]);
        ctx.fillStyle = face; ctx.fillRect(x,y,w,h);
        // roof
        ctx.fillStyle = 'rgba(255,255,255,.12)'; ctx.fillRect(x,y, w, 8);
        // windows
        const cols = Math.max(2, Math.floor(w/20));
        const rows = Math.max(3, Math.floor(h/24));
        for(let ry=0; ry<rows; ry++){
          for(let rx=0; rx<cols; rx++){
            const wx = x + 8 + rx*(w-16)/cols + 2;
            const wy = y + 14 + ry*(h-22)/rows + 2;
            const ww = Math.max(6, (w-22)/cols - 4);
            const wh = Math.max(8, (h-28)/rows - 5);
            if (ww<4 || wh<5) continue;
            const lit = ((rx + ry + (b.seed % 7)) % 5) !== 0;
            ctx.fillStyle = lit ? 'rgba(255,230,150,.55)' : 'rgba(8,10,16,.7)';
            ctx.fillRect(wx, wy, ww, wh);
          }
        }
        // damage overlay if low HP
        if (b.hp < 40){
          ctx.fillStyle = 'rgba(200,80,60,0.08)'; ctx.fillRect(x, y, w, h);
        }
        ctx.restore();
      }
    }
  }

  function drawPedestrian(ped){
    if (ped.ragdoll){
      const p = ped.parts;
      ctx.save(); ctx.lineCap='round'; ctx.strokeStyle='#1a1418'; ctx.lineWidth=4;
      const links = [['head','torso'],['torso','handL'],['torso','handR'],['torso','footL'],['torso','footR']];
      for(const [aK,bK] of links){
        const a = p[aK], b = p[bK];
        ctx.beginPath(); ctx.moveTo(a.x - state.cameraX, a.y - state.cameraY); ctx.lineTo(b.x - state.cameraX, b.y - state.cameraY); ctx.stroke();
      }
      for(const part of Object.values(p)){
        const x = part.x - state.cameraX, y = part.y - state.cameraY;
        ctx.fillStyle = '#efefef'; ctx.beginPath(); ctx.arc(x,y,part.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,.22)'; ctx.beginPath(); ctx.arc(x+1,y+1,part.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      return;
    }
    if (!ped.alive) return;
    const x = ped.x - state.cameraX, y = ped.y - state.cameraY;
    const sway = Math.sin(ped.walk)*4, arm = Math.sin(ped.walk*1.4)*8, leg = Math.cos(ped.walk*1.4)*8;
    ctx.save(); ctx.strokeStyle='#111'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.fillStyle='#f2e7d4'; ctx.beginPath(); ctx.arc(x, y-28, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-21); ctx.lineTo(x,y-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-15); ctx.lineTo(x-10,y-10+arm*0.2); ctx.moveTo(x,y-15); ctx.lineTo(x+10,y-10-arm*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-2); ctx.lineTo(x-7+sway*0.2,y+16+leg*0.15); ctx.moveTo(x,y-2); ctx.lineTo(x+7-sway*0.2,y+16-leg*0.15); ctx.stroke();
    ctx.restore();
  }

  function drawCar(){
    const x = car.x - state.cameraX, y = car.y - state.cameraY;
    ctx.save(); ctx.translate(x,y); ctx.rotate(car.angle);

    // shadow
    ctx.save(); ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(0, 28, 58 + Math.abs(car.vx)*2, 12, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();

    // wheels (separate arcs - fixed draw order)
    const wheelY = 20, wheelX = 38;
    ctx.fillStyle = '#0b0b0b';
    ctx.beginPath(); ctx.arc(-wheelX, wheelY, 14, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(wheelX, wheelY, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2b2b2b'; ctx.beginPath(); ctx.arc(-wheelX, wheelY, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(wheelX, wheelY, 7, 0, Math.PI*2); ctx.fill();

    // body with gradient & subtle glow
    const body = ctx.createLinearGradient(-60,-26,60,26); body.addColorStop(0,'#ff7b2f'); body.addColorStop(0.5,'#ffb03a'); body.addColorStop(1,'#8e3d0d');
    ctx.shadowColor = 'rgba(255,160,80,0.14)'; ctx.shadowBlur = 18; ctx.shadowOffsetY = 6;
    ctx.fillStyle = body; roundRect(ctx, -58, -18, 116, 34, 10); ctx.fill();

    // roof
    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,.18)'; roundRect(ctx, -24, -30, 52, 22, 8); ctx.fill();

    // windows
    ctx.fillStyle = 'rgba(200,235,255,.72)'; roundRect(ctx, -20, -26, 18, 14, 4); ctx.fill(); roundRect(ctx, 2, -26, 18, 14, 4); ctx.fill();

    // lights
    ctx.fillStyle = '#ffe18b'; ctx.fillRect(48,-8,8,6); ctx.fillStyle = '#ff5a5a'; ctx.fillRect(-56,-8,8,6);

    // exhaust puff when fast
    if (Math.abs(car.vx) > 5 && car.onGround){
      ctx.fillStyle = 'rgba(220,220,220,.55)';
      ctx.beginPath(); ctx.arc(-62, 12, 3 + Math.random()*2, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }

  function roundRect(ctx,x,y,w,h,r){ r = Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawDebris(){
    for(const d of state.debris){
      const x = d.x - state.cameraX, y = d.y - state.cameraY;
      ctx.save(); ctx.translate(x,y); ctx.rotate(d.rot); ctx.fillStyle = d.color; ctx.fillRect(-d.w*0.5,-d.h*0.5,d.w,d.h); ctx.restore();
    }
  }

  function drawParticles(){
    for(const p of state.particles){
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x - state.cameraX, p.y - state.cameraY, p.r, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawUI(){
    const speed = Math.abs(car.vx);
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.22)'; roundRect(ctx, 16, 16, 340, 106, 16); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '700 20px system-ui, sans-serif'; ctx.fillText(`Speed: ${speed.toFixed(1)}`, 30, 46);
    ctx.fillText(`Distance: ${state.distance} m`, 30, 72); ctx.fillText(`Buildings smashed: ${state.score}`, 30, 98);
    ctx.fillStyle = 'rgba(255,255,255,.92)'; ctx.font = '700 18px system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.fillText(state.message, W*0.5, 44);
    ctx.textAlign = 'left';
    ctx.restore();

    // small speed arc
    ctx.save();
    const cx = W - 90, cy = 72;
    ctx.lineWidth = 6;
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    ctx.beginPath(); ctx.arc(cx,cy,36,Math.PI*0.75,Math.PI*0.25,false); ctx.stroke();
    ctx.strokeStyle = '#ffb059';
    const t = clamp(Math.abs(car.vx)/PH.maxSpeed, 0, 1);
    ctx.beginPath(); ctx.arc(cx,cy,36,Math.PI*0.75, Math.PI*0.75 + (Math.PI*1.5)*t, false); ctx.stroke();
    ctx.restore();
  }

  function render(){
    const shake = state.shake;
    const sx = (Math.random()-0.5)*shake, sy = (Math.random()-0.5)*shake;
    ctx.save(); ctx.clearRect(0,0,W,H); ctx.translate(sx,sy);
    drawBackground(); drawTerrainAndCity();
    drawDebris(); drawParticles();
    // pedestrians
    const cIndex = Math.floor(car.x / CHUNK_W);
    for(let ci = cIndex-2; ci<=cIndex+2; ci++){
      const chunk = getChunk(ci);
      for(const ped of chunk.pedestrians) drawPedestrian(ped);
      // draw lamp posts (breakables)
      const posts = state.lampPosts[ci] || [];
      for(const post of posts){
        const x = post.x - state.cameraX, y = post.y - state.cameraY;
        if (post.destroyed) continue;
        ctx.save(); ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y-36); ctx.stroke();
        ctx.fillStyle = '#ffdca3'; ctx.beginPath(); ctx.ellipse(x, y-40, 10,6,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
    drawCar(); drawUI(); ctx.restore();
  }

  function loop(){
    update(); render(); // cap frame sensible
    requestAnimationFrame(loop);
  }

  function doReset(){
    state.chunks.clear(); state.lampPosts = [];
    car.x = 140; car.y = groundY(140) - 70; car.vx = 0; car.vy = 0; car.angle = 0; car.angVel = 0; car.onGround = false;
    state.cameraX = 0; state.cameraY = 0; state.shake = 0; state.score = 0; state.distance = 0; state.message = 'Floor it.'; state.messageTimer = 180;
    state.debris.length = 0; state.particles.length = 0; jumpQueued = false;
    // decide whether to show touch targets
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) showTouch(); else hideTouch();
    document.getElementById('msg').textContent = state.message;
  }

  // small device hint
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) showTouch();

  doReset();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
