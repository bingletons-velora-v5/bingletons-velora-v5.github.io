<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RGB Grass Screensaver</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #050805;
  }

  canvas {
    display: block;
    filter: blur(0.6px); /* 🌫️ slight blur for softer look */
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// 🌿 grass setup
const spacing = 10;
const blades = [];

for (let x = 0; x < window.innerWidth; x += spacing) {
  for (let y = 0; y < window.innerHeight; y += spacing) {
    blades.push({
      x,
      y
    });
  }
}

let t = 0;

// 🌐 fullscreen toggle
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// press P for fullscreen
window.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "p") {
    toggleFullscreen();
  }
});

function loop() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
  ctx.fillRect(0, 0, w, h);

  t += 0.02;

  for (let b of blades) {
    const wave =
      Math.sin(b.x * 0.012 + t * 1.3) +
      Math.cos(b.y * 0.012 + t * 1.1);

    const sway = wave * 10;
    const height = 12 + wave * 7;

    const x1 = b.x;
    const y1 = b.y;

    const x2 = b.x + sway;
    const y2 = b.y - height;

    // 🌈 RGB cycling
    const r = 80 + Math.sin(t + b.x * 0.01) * 80;
    const g = 120 + Math.sin(t * 1.1 + b.y * 0.01) * 80;
    const bl = 80 + Math.sin(t * 1.3 + b.x * 0.01 + b.y * 0.01) * 80;

    ctx.strokeStyle = `rgb(${r}, ${g}, ${bl})`;

    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
