<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Velora — Games</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07080b;
      --bg2:#0d1017;
      --card: rgba(18, 22, 31, .72);
      --card2: rgba(255,255,255,.04);
      --text:#f5f7fb;
      --muted: rgba(245,247,251,.62);
      --line: rgba(255,255,255,.08);
      --glow: rgba(120, 255, 214, .16);
      --accent: #7cffd6;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      overflow:hidden;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(124,255,214,.07), transparent 22%),
        radial-gradient(circle at 15% 80%, rgba(95,136,255,.08), transparent 20%),
        radial-gradient(circle at 85% 75%, rgba(183,92,255,.06), transparent 18%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
    }

    #stars{ z-index:0; }
    #constellations{ z-index:1; }

    .overlay{
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.012), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,.012), transparent 20%);
    }

    .page{
      position:relative;
      z-index:3;
      min-height:100vh;
      padding:24px 18px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .shell{
      width:min(1220px, 100%);
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .back{
      text-decoration:none;
      color:rgba(255,255,255,.92);
      background:rgba(18,22,31,.78);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius:14px;
      height:46px;
      padding:0 15px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .back:hover{
      transform:translateY(-3px);
      border-color: rgba(124,255,214,.22);
      box-shadow: 0 22px 60px rgba(0,0,0,.52);
      background: rgba(24, 30, 42, .9);
    }

    .hero{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-start;
      padding:4px 0 2px;
    }

    .title{
      margin:0;
      font-size:clamp(2.3rem, 4vw, 4rem);
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:.96rem;
    }

    .tools{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      width:100%;
    }

    .search{
      flex:1 1 280px;
      height:48px;
      border-radius:14px;
      border:1px solid var(--line);
      outline:none;
      padding:0 16px;
      color:var(--text);
      background:rgba(18,22,31,.72);
      box-shadow:var(--shadow);
      font:inherit;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition:border-color .18s ease, transform .18s ease, background .18s ease;
    }

    .search::placeholder{ color: rgba(245,247,251,.38); }

    .search:focus{
      border-color: rgba(124,255,214,.24);
      background: rgba(22, 27, 38, .88);
      transform: translateY(-1px);
    }

    .pill{
      height:48px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(18,22,31,.72);
      color:rgba(255,255,255,.88);
      font:inherit;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .pill:hover{
      transform:translateY(-2px);
      border-color: rgba(124,255,214,.2);
      background: rgba(24, 30, 42, .9);
    }

    .meta-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:.88rem;
      flex-wrap:wrap;
    }

    .grid-wrap{
      position:relative;
      border:1px solid var(--line);
      border-radius:24px;
      background: rgba(8, 10, 15, .4);
      box-shadow: var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .grid-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background: rgba(255,255,255,.02);
    }

    .grid-head strong{
      font-size:1rem;
      letter-spacing:-.02em;
    }

    .grid-head span{
      color:var(--muted);
      font-size:.88rem;
    }

    .grid-shell{
      max-height:min(68vh, 820px);
      overflow:auto;
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
      gap:14px;
    }

    .card{
      position:relative;
      border-radius:18px;
      border:1px solid var(--line);
      overflow:hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
      cursor:pointer;
      transform: translateZ(0);
      transition:
        transform .2s ease,
        box-shadow .2s ease,
        border-color .2s ease,
        background .2s ease;
      will-change: transform;
      isolation:isolate;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(circle at 50% 0%, rgba(124,255,214,.18), transparent 38%);
      opacity:0;
      transition:opacity .2s ease;
      z-index:0;
    }

    .card:hover{
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(124,255,214,.22);
      box-shadow:
        0 22px 44px rgba(0,0,0,.42),
        0 0 0 1px rgba(124,255,214,.05),
        0 0 40px rgba(124,255,214,.08);
    }

    .card:hover::before{
      opacity:1;
    }

    .cover{
      position:relative;
      aspect-ratio: 16 / 10;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.10), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      overflow:hidden;
    }

    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition: transform .35s ease, filter .35s ease;
      filter:saturate(1.05) contrast(1.02);
    }

    .card:hover .cover img{
      transform: scale(1.08);
      filter:saturate(1.15) contrast(1.06);
    }

    .cover::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,.58) 100%);
      pointer-events:none;
    }

    .badge{
      position:absolute;
      left:10px;
      top:10px;
      z-index:1;
      padding:6px 9px;
      border-radius:999px;
      background: rgba(10, 14, 22, .74);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.9);
      font-size:.72rem;
      font-weight:700;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .info{
      position:relative;
      z-index:1;
      padding:12px 12px 14px;
    }

    .name{
      margin:0 0 5px;
      font-size:.98rem;
      font-weight:700;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small{
      color: rgba(245,247,251,.6);
      font-size:.8rem;
    }

    .status{
      padding:18px 16px;
      color: var(--muted);
      font-size:.95rem;
    }

    .spinner{
      display:inline-block;
      width:14px;
      height:14px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      border-top-color: rgba(124,255,214,.95);
      animation:spin .8s linear infinite;
      vertical-align:-2px;
      margin-right:8px;
    }

    @keyframes spin{ to { transform: rotate(360deg); } }

    .viewer{
      position:fixed;
      inset:0;
      z-index:20;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: rgba(0,0,0,.72);
    }

    .viewer.active{ display:flex; }

    .viewer-panel{
      width:min(1200px, 100%);
      height:min(84vh, 880px);
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(9,12,18,.98);
      box-shadow: 0 30px 100px rgba(0,0,0,.72);
      display:flex;
      flex-direction:column;
    }

    .viewer-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }

    .viewer-title{
      font-weight:700;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .viewer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .icon-btn{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.9);
      border-radius:12px;
      padding:9px 12px;
      cursor:pointer;
      font:inherit;
      transition: background .18s ease, transform .18s ease, border-color .18s ease;
    }

    .icon-btn:hover{
      background: rgba(255,255,255,.09);
      transform: translateY(-1px);
      border-color: rgba(124,255,214,.18);
    }

    .viewer-iframe{
      flex:1;
      width:100%;
      border:0;
      background:#000;
    }

    .v5{
      position:fixed;
      z-index:4;
      left:50%;
      top:50%;
      pointer-events:none;
      font-size:.72rem;
      font-weight:800;
      letter-spacing:.22em;
      color: rgba(255,255,255,.34);
      text-shadow: 0 0 12px rgba(255,255,255,.08);
      transform-origin:center center;
      user-select:none;
      animation:spinText 8s linear infinite;
    }

    @keyframes spinText{
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (max-width: 760px){
      body{ overflow:auto; }
      .page{ padding-top:18px; padding-bottom:18px; }
      .grid-shell{ max-height:none; }
      .grid{ grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); }
      .title{ font-size:2.3rem; }
      .viewer-panel{ height:min(88vh, 880px); }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>
  <div class="v5" id="v5">v5</div>

  <main class="page">
    <section class="shell" aria-label="Velora games">
      <div class="topbar">
        <a class="back" href="index.html" aria-label="Back to home">← Back</a>
        <div class="hero">
          <h1 class="title">Games</h1>
          <p class="subtitle">Browse the catalog and launch anything with one click.</p>
        </div>
      </div>

      <div class="tools">
        <input id="search" class="search" type="search" placeholder="Search games..." autocomplete="off" />
        <button class="pill" id="refreshBtn" type="button">Refresh</button>
      </div>

      <div class="meta-row">
        <div id="countText">Loading games…</div>
        <div id="pageText">Page 1</div>
      </div>

      <div class="grid-wrap">
        <div class="grid-head">
          <div>
            <strong>Featured catalog</strong><br>
            <span>Simple, fast, and clean.</span>
          </div>
          <div id="catalogInfo">Headless mode</div>
        </div>

        <div class="grid-shell" id="gridShell">
          <div id="status" class="status"><span class="spinner"></span>Loading games…</div>
          <div class="grid" id="games" aria-live="polite" aria-label="Games grid"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="viewer-panel">
      <div class="viewer-top">
        <div class="viewer-title" id="viewerTitle">Loading…</div>
        <div class="viewer-actions">
          <button class="icon-btn" id="fullscreenBtn" type="button">Fullscreen</button>
          <button class="icon-btn" id="closeViewer" type="button">Close</button>
        </div>
      </div>
      <iframe id="gameFrame" class="viewer-iframe" src="about:blank" allow="autoplay; fullscreen; pointer-lock; gamepad" allowfullscreen title="Game player"></iframe>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

  <script>
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');
    const v5 = document.getElementById('v5');

    const grid = document.getElementById('games');
    const statusEl = document.getElementById('status');
    const countText = document.getElementById('countText');
    const pageText = document.getElementById('pageText');
    const search = document.getElementById('search');
    const refreshBtn = document.getElementById('refreshBtn');
    const catalogInfo = document.getElementById('catalogInfo');

    const viewer = document.getElementById('viewer');
    const viewerTitle = document.getElementById('viewerTitle');
    const gameFrame = document.getElementById('gameFrame');
    const closeViewer = document.getElementById('closeViewer');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let W = 0, H = 0;
    let stars = [];
    let allGames = [];
    let imageMap = new Map();
    let currentPage = 1;
    let totalPages = 1;
    let loading = false;
    let searchTerm = '';

    function placeV5() {
      const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
      const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
      v5.style.left = `${x}px`;
      v5.style.top = `${y}px`;
    }

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
      placeV5();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;

        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));

        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';

      const maxD = Math.max(110, Math.min(240, (W + H) / 12));

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const matches = [];

        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }

        matches.sort((a, b) => a.d - b.d);

        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }

      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      stars.forEach(s => { s.vx = 0; s.vy = 0; });
    }

    function setStatus(message) {
      statusEl.innerHTML = message;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function matchesSearch(game) {
      if (!searchTerm) return true;
      const hay = `${game.name || ''} ${game.category || ''} ${game.id || ''}`.toLowerCase();
      return hay.includes(searchTerm);
    }

    function renderGrid() {
      const filtered = allGames.filter(matchesSearch);

      grid.innerHTML = '';
      countText.textContent = `${filtered.length.toLocaleString()} game${filtered.length === 1 ? '' : 's'} shown`;
      pageText.textContent = `Page ${currentPage} / ${totalPages || 1}`;

      if (!filtered.length) {
        setStatus(`No games match “${escapeHtml(search.value.trim())}”.`);
        return;
      }

      setStatus('');

      for (const game of filtered) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.dataset.gameId = game.id;
        card.dataset.title = game.name || game.id;

        const img = imageMap.get(game.id) || '';
        const category = game.category || 'Arcade';

        card.innerHTML = `
          <div class="cover">
            <span class="badge">${escapeHtml(category)}</span>
            ${img ? `<img src="${img}" alt="${escapeHtml(game.name || game.id)}">` : ''}
          </div>
          <div class="info">
            <p class="name">${escapeHtml(game.name || game.id)}</p>
            <div class="small">Click to play</div>
          </div>
        `;

        card.addEventListener('click', () => openGame(game));
        grid.appendChild(card);
      }
    }

    async function loadPage(page = 1) {
      if (!window.Lumin) {
        setStatus('Lumin could not be loaded.');
        return;
      }

      loading = true;
      setStatus('<span class="spinner"></span>Loading games…');
      catalogInfo.textContent = 'Connecting…';

      try {
        if (typeof Lumin.init === 'function') {
          await Lumin.init({ headless: true });
        }

        const result = await Lumin.getGames({ page, limit: 24 });
        allGames = result.games || [];
        currentPage = page;
        totalPages = result.pages || 1;

        imageMap = new Map();
        await Promise.all(allGames.map(async (g) => {
          try {
            const img = await Lumin.getImageUrl(g.image_token);
            imageMap.set(g.id, img);
          } catch (err) {
            imageMap.set(g.id, '');
          }
        }));

        catalogInfo.textContent = 'Headless mode active';
        loading = false;
        renderGrid();
      } catch (err) {
        console.error(err);
        loading = false;
        catalogInfo.textContent = 'Load failed';
        setStatus('Could not load games right now.');
      }
    }

    async function openGame(game) {
      try {
        viewerTitle.textContent = game.name || 'Game';
        viewer.classList.add('active');
        viewer.setAttribute('aria-hidden', 'false');

        if (!window.Lumin) return;

        const { url } = await Lumin.getGameUrl(game.id);
        gameFrame.src = url;
        document.body.style.overflow = 'hidden';
      } catch (err) {
        console.error(err);
        viewerTitle.textContent = 'Game';
        gameFrame.src = 'about:blank';
      }
    }

    function closeGame() {
      viewer.classList.remove('active');
      viewer.setAttribute('aria-hidden', 'true');
      gameFrame.src = 'about:blank';
      document.body.style.overflow = '';
    }

    grid.addEventListener('mousemove', (e) => {
      const card = e.target.closest('.card');
      if (!card) return;
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * 8;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * 8;
      card.style.transform = `translateY(-6px) scale(1.01) rotateX(${-y}deg) rotateY(${x}deg)`;
    });

    grid.addEventListener('mouseleave', () => {
      document.querySelectorAll('.card').forEach(card => {
        card.style.transform = '';
      });
    });

    search.addEventListener('input', () => {
      searchTerm = search.value.trim().toLowerCase();
      renderGrid();
    });

    refreshBtn.addEventListener('click', () => loadPage(1));

    closeViewer.addEventListener('click', closeGame);

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (gameFrame.requestFullscreen) {
          await gameFrame.requestFullscreen();
        } else if (gameFrame.webkitRequestFullscreen) {
          await gameFrame.webkitRequestFullscreen();
        } else {
          window.open(gameFrame.src, '_blank', 'noopener');
        }
      } catch (err) {
        console.warn('Fullscreen failed', err);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && viewer.classList.contains('active')) {
        closeGame();
      }
    });

    window.addEventListener('load', () => {
      loadPage(1);
    });
  </script>
</body>
</html>
