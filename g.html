<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velora</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #070707;
      --bg-2: #101010;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.58);
      --border: rgba(180, 255, 230, 0.12);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --accent: #b4ffe6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.04), transparent 26%),
        radial-gradient(circle at 50% 55%, rgba(122, 255, 202, 0.04), transparent 44%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.018), transparent 16%),
        radial-gradient(circle at 78% 74%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      padding: 28px 22px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      width: min(1220px, 100%);
      text-align: center;
      padding-top: 14px;
      margin-bottom: 18px;
    }

    .brand {
      margin: 0;
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.1rem, 8vw, 7rem);
      line-height: 0.9;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
      user-select: none;
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.08rem);
      line-height: 1.6;
    }

    .content {
      width: min(1440px, 100%);
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #games {
      width: 100%;
      height: calc(100vh - 200px);
      min-height: 560px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 22px;
      background:
        radial-gradient(circle at top, rgba(122,255,202,0.05), transparent 40%),
        rgba(10, 10, 10, 0.18);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 18px;
    }

    .games-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .games-toolbar h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .games-toolbar .meta {
      color: rgba(255,255,255,0.58);
      font-size: 0.92rem;
    }

    .games-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .game-card {
      cursor: pointer;
      border: 1px solid rgba(180,255,230,0.12);
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      min-height: 190px;
      display: flex;
      flex-direction: column;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: rgba(180,255,230,0.28);
      background: rgba(180,255,230,0.06);
    }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      display: block;
    }

    .game-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .game-name {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
    }

    .game-cat {
      margin: 0;
      font-size: 0.84rem;
      color: rgba(255,255,255,0.55);
    }

    .topline {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.34);
      user-select: none;
    }

    .v5 {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: 50%;
      pointer-events: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.38);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
      transform-origin: center center;
      user-select: none;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Popup modal */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(10px);
    }

    .modal.hidden { display: none; }

    .modal-card {
      width: min(1080px, 100%);
      height: min(88vh, 860px);
      border: 1px solid rgba(180, 255, 230, 0.18);
      border-radius: 24px;
      background:
        radial-gradient(circle at top, rgba(180,255,230,0.10), transparent 35%),
        rgba(12, 12, 12, 0.97);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.65);
      padding: 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      padding-right: 44px;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1.15;
      color: #fff;
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: rgba(255,255,255,0.62);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-frame-wrap {
      flex: 1;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: #000;
    }

    .modal-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal-btn {
      appearance: none;
      border: 1px solid rgba(180, 255, 230, 0.22);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .modal-btn:hover {
      transform: translateY(-1px);
      background: rgba(180,255,230,0.10);
      border-color: rgba(180, 255, 230, 0.36);
    }

    @media (max-width: 700px) {
      body { overflow: auto; }
      .page { padding-top: 22px; padding-bottom: 24px; }
      #games {
        height: auto;
        min-height: 680px;
      }
      .content { min-height: 680px; }

      .modal-card {
        width: min(100%, 520px);
        height: min(90vh, 820px);
        padding: 16px;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>
  <div class="v5" id="v5">v5</div>

  <main class="page">
    <section class="hero" aria-label="Velora games page">
      <h1 class="brand">velora</h1>
      <p class="subtitle">browse over 1,000 games with LuminSDK!</p>
      <div class="topline">poki-style layout • custom popup player • fast browse</div>
    </section>

    <section class="content">
      <div id="games">
        <div class="games-toolbar">
          <div>
            <h2>Games</h2>
            <div class="meta" id="gamesMeta">Loading…</div>
          </div>
        </div>
        <div class="games-grid" id="gamesGrid"></div>
      </div>
    </section>
  </main>

  <div id="gameModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-card" id="modalCard">
      <button class="modal-close" id="modalClose" aria-label="Close popup">×</button>

      <div class="modal-top">
        <div>
          <h2 class="modal-title" id="modalTitle">Game Title</h2>
          <p class="modal-subtitle" id="modalSubtitle">Selected game details will appear here.</p>
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn" id="modalFullscreen">Fullscreen</button>
        <button class="modal-btn" id="modalBack">Back</button>
      </div>

      <div class="modal-frame-wrap" id="modalFrameWrap">
        <iframe
          id="gameFrame"
          class="modal-frame"
          title="Game player"
          allow="autoplay; fullscreen; pointer-lock; gamepad"
          loading="eager"
        ></iframe>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const starsCanvas = document.getElementById('stars');
      const starsCtx = starsCanvas.getContext('2d');
      const constCanvas = document.getElementById('constellations');
      const constCtx = constCanvas.getContext('2d');
      const v5 = document.getElementById('v5');

      const gamesMeta = document.getElementById('gamesMeta');
      const gamesGrid = document.getElementById('gamesGrid');

      const modal = document.getElementById('gameModal');
      const modalCard = document.getElementById('modalCard');
      const modalTitle = document.getElementById('modalTitle');
      const modalSubtitle = document.getElementById('modalSubtitle');
      const modalClose = document.getElementById('modalClose');
      const modalBack = document.getElementById('modalBack');
      const modalFullscreen = document.getElementById('modalFullscreen');
      const gameFrame = document.getElementById('gameFrame');

      let W = 0, H = 0;
      let stars = [];
      let activeGame = {
        id: '',
        title: '',
        url: ''
      };

      function placeV5() {
        const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
        const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
        v5.style.left = `${x}px`;
        v5.style.top = `${y}px`;
      }

      function makeStars() {
        stars = [];
        const total = Math.max(90, Math.floor((W * H) / 16000));
        for (let i = 0; i < total; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.5 + 0.2,
            a: Math.random() * 0.7 + 0.15,
            vx: (Math.random() - 0.5) * 0.03,
            vy: (Math.random() - 0.5) * 0.03
          });
        }
      }

      function resize() {
        W = starsCanvas.width = constCanvas.width = window.innerWidth;
        H = starsCanvas.height = constCanvas.height = window.innerHeight;
        makeStars();
        placeV5();
      }

      function drawStars() {
        starsCtx.clearRect(0, 0, W, H);
        for (const s of stars) {
          s.x += s.vx;
          s.y += s.vy;

          if (s.x < -10) s.x = W + 10;
          if (s.x > W + 10) s.x = -10;
          if (s.y < -10) s.y = H + 10;
          if (s.y > H + 10) s.y = -10;

          const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
          const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));

          starsCtx.beginPath();
          starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
          starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          starsCtx.fill();
        }
      }

      function drawConstellations() {
        constCtx.clearRect(0, 0, W, H);
        constCtx.setLineDash([7, 10]);
        constCtx.lineCap = 'round';
        const maxD = Math.max(110, Math.min(240, (W + H) / 12));

        for (let i = 0; i < stars.length; i++) {
          const s = stars[i];
          const matches = [];

          for (let j = 0; j < stars.length; j++) {
            if (i === j) continue;
            const t = stars[j];
            const dx = t.x - s.x;
            const dy = t.y - s.y;
            const d = Math.hypot(dx, dy);
            if (d < maxD) matches.push({ t, d });
          }

          matches.sort((a, b) => a.d - b.d);

          for (let k = 0; k < Math.min(2, matches.length); k++) {
            const { t, d } = matches[k];
            const alpha = (1 - d / maxD) * 0.22;
            const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
            grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
            grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);

            constCtx.strokeStyle = grad;
            constCtx.lineWidth = 1;
            constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
            constCtx.beginPath();
            constCtx.moveTo(s.x, s.y);
            constCtx.lineTo(t.x, t.y);
            constCtx.stroke();
          }
        }

        constCtx.setLineDash([]);
        for (const s of stars) {
          constCtx.beginPath();
          constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
          constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
          constCtx.fill();
        }
      }

      function animate() {
        drawStars();
        drawConstellations();
        requestAnimationFrame(animate);
      }

      function openPopup({ id, title, url, category }) {
        activeGame = { id, title, url };
        modalTitle.textContent = title || 'Selected Game';
        modalSubtitle.textContent = category ? `Category: ${category}` : 'Click Fullscreen for a larger view.';
        gameFrame.src = url;
        modal.classList.remove('hidden');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closePopup() {
        modal.classList.add('hidden');
        modal.setAttribute('aria-hidden', 'true');
        gameFrame.src = 'about:blank';
        activeGame = { id: '', title: '', url: '' };
      }

      async function goFullscreen() {
        try {
          if (modalCard.requestFullscreen) {
            await modalCard.requestFullscreen();
          }
        } catch (err) {
          console.error('Fullscreen failed:', err);
        }
      }

      modalClose.addEventListener('click', closePopup);
      modalBack.addEventListener('click', closePopup);
      modalFullscreen.addEventListener('click', goFullscreen);

      modal.addEventListener('click', (e) => {
        if (e.target === modal) closePopup();
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePopup();
      });

      window.addEventListener('resize', resize);

      resize();
      animate();

      if (!window.Lumin) {
        gamesMeta.textContent = 'LuminSDK failed to load.';
        return;
      }

      try {
        await Lumin.init({
          container: '#games',
          headless: true
        });

        const result = await Lumin.getGames({ page: 1, limit: 24 });
        const games = result.games || [];

        gamesMeta.textContent = `${result.total || games.length} games available`;

        gamesGrid.innerHTML = '';

        for (const game of games) {
          const imageUrl = game.image_token ? await Lumin.getImageUrl(game.image_token) : '';
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'game-card';
          card.innerHTML = `
            <img class="game-thumb" src="${imageUrl || ''}" alt="${game.name || 'Game'}">
            <div class="game-info">
              <p class="game-name">${game.name || 'Untitled Game'}</p>
              <p class="game-cat">${game.category || 'Game'}</p>
            </div>
          `;

          card.addEventListener('click', async () => {
            try {
              const { url, meta } = await Lumin.getGameUrl(game.id);
              openPopup({
                id: game.id,
                title: meta?.name || game.name || 'Selected Game',
                url,
                category: meta?.category || game.category || ''
              });
            } catch (err) {
              console.error('Could not load game:', err);
              modalTitle.textContent = 'Error';
              modalSubtitle.textContent = 'That game could not be loaded.';
              modal.classList.remove('hidden');
            }
          });

          gamesGrid.appendChild(card);
        }

      } catch (err) {
        console.error('LuminSDK error:', err);
        gamesMeta.textContent = 'Could not load games.';
      }
    });
  </script>
</body>
</html>
