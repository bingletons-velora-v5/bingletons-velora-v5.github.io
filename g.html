<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Velora — Games</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0b;
      --bg-2: #121212;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.52);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(122, 255, 202, 0.03), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px 22px;
    }

    .shell {
      width: min(980px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .top-row {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      pointer-events: auto;
    }

    .back {
      text-decoration: none;
      color: rgba(255,255,255,0.9);
      background: rgba(28, 28, 28, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      border-radius: 10px;
      height: 46px;
      min-width: 46px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .back:hover {
      transform: translateY(-3px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.88);
    }

    .back span {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .brand {
      margin: 0;
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.4rem, 9vw, 7.2rem);
      line-height: 0.9;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
      transform: translateY(2px);
      user-select: none;
    }

    .heading {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
      user-select: none;
    }

    .apps {
      width: min(780px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px 12px;
    }

    .app {
      pointer-events: auto;
      min-height: 112px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(28, 28, 28, 0.8);
      box-shadow: var(--shadow);
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 14px;
    }

    .app:hover {
      transform: translateY(-4px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.88);
    }

    .app-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      color: white;
      background: rgba(255,255,255,0.08);
    }

    .app-label {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.92);
    }

    .app-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.48);
    }

    .library {
      width: min(980px, 100%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .library-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(28, 28, 28, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: left;
    }

    .library-bar strong {
      display: block;
      font-size: 1rem;
      color: rgba(255,255,255,0.95);
      margin-bottom: 3px;
    }

    .library-bar span {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.52);
    }

    .library-tools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tool {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.9);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .tool:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(216,255,240,0.18);
    }

    #games {
      width: 100%;
      max-height: min(52vh, 560px);
      overflow: auto;
      padding: 8px 2px 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    .game-card {
      background: rgba(28, 28, 28, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      text-align: left;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.9);
    }

    .thumb {
      height: 104px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      color: rgba(255,255,255,0.7);
      font-weight: 700;
      padding: 10px;
      text-align: center;
    }

    .meta {
      padding: 12px 12px 13px;
    }

    .g-title {
      font-weight: 700;
      font-size: 0.96rem;
      color: rgba(255,255,255,0.96);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .g-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.48);
    }

    .v5 {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: 50%;
      pointer-events: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.38);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
      transform-origin: center center;
      user-select: none;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.72);
      padding: 18px;
    }

    .viewer.active { display: flex; }

    .viewer-panel {
      width: min(1200px, 100%);
      height: min(82vh, 860px);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(18,18,18,0.96);
      box-shadow: 0 28px 90px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
    }

    .viewer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
    }

    .viewer-title {
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-actions {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font: inherit;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .viewer-iframe {
      flex: 1;
      border: 0;
      width: 100%;
      background: #000;
    }

    @media (max-width: 760px) {
      .page { padding-top: 72px; padding-bottom: 72px; }
      .shell { gap: 18px; }
      .apps { width: min(360px, 100%); grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .app { min-height: 96px; }
      .library-bar { flex-direction: column; align-items: flex-start; }
      .library-tools { justify-content: flex-start; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      #games { max-height: 48vh; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>
  <div class="v5" id="v5">v5</div>

  <main class="page">
    <section class="shell" aria-label="Velora games">
      <div class="top-row">
        <a class="back" href="index.html" aria-label="Back to home">
          <span>← Back</span>
        </a>
      </div>

      <h1 class="brand">Velora</h1>
      <p class="heading">games</p>

      <div class="library">
        <div class="library-bar">
          <div>
            <strong>Browse or play 2,342 games</strong>
          </div>

        <div id="games" aria-live="polite" aria-label="Games container"></div>
      </div>
    </section>
  </main>

  <div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="viewer-panel" role="document">
      <div class="viewer-top">
        <div class="viewer-title" id="viewerTitle">Loading…</div>
        <div class="viewer-actions">
          <button class="icon-btn" id="openFullscreen" type="button">Fullscreen</button>
          <button class="icon-btn" id="closeViewer" type="button">Back</button>
        </div>
      </div>
      <iframe id="gameFrame" class="viewer-iframe" src="about:blank" title="Game viewer"></iframe>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

  <script>
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');
    const v5 = document.getElementById('v5');

    let W = 0, H = 0;
    let stars = [];

    function placeV5() {
      const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
      const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
      v5.style.left = `${x}px`;
      v5.style.top = `${y}px`;
    }

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
      placeV5();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;

        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));

        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';

      const maxD = Math.max(110, Math.min(240, (W + H) / 12));

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        let matches = [];

        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }

        matches.sort((a, b) => a.d - b.d);

        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }

      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      stars.forEach(s => { s.vx = 0; s.vy = 0; });
    }

    try {
      if (window.Lumin && typeof Lumin.init === 'function') {
        Lumin.init({
          container: '#games',
          theme: 'dark'
        });
      }
    } catch (e) {
      console.warn('Lumin init failed or not available', e);
    }

    (function populateFallbackIfEmpty(){
      const container = document.getElementById('games');

      const fallback = () => {
        if (!container) return;
        if (container.children.length === 0 || container.querySelectorAll('.game-card').length === 0) {
          const grid = document.createElement('div');
          grid.className = 'grid';

          const demo = [
            {id:'milkman-karlson', title:'Milkman Karlson', url:'https://example.com/game1'},
            {id:'geometry-dash', title:'Geometry Dash Remastered', url:'https://example.com/game2'},
            {id:'jetski-race', title:'Jetski Race', url:'https://example.com/game3'},
            {id:'hotline-miami', title:'Hotline Miami', url:'https://example.com/game4'},
            {id:'bad-ice-cream-3', title:'Bad Ice Cream 3', url:'https://example.com/game5'},
            {id:'mega-man-4', title:'Mega Man 4', url:'https://example.com/game6'}
          ];

          demo.forEach(g => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.dataset.gameId = g.id;
            card.dataset.gameUrl = g.url;
            card.innerHTML = `
              <div class="thumb">${g.title}</div>
              <div class="meta">
                <div class="g-title">${g.title}</div>
                <div class="g-sub">HTML5 · Arcade</div>
              </div>
            `;
            grid.appendChild(card);
          });

          container.appendChild(grid);
        }
      };

      setTimeout(fallback, 900);
      setTimeout(fallback, 2500);
    })();

    const viewer = document.getElementById('viewer');
    const viewerTitle = document.getElementById('viewerTitle');
    const gameFrame = document.getElementById('gameFrame');
    const closeViewer = document.getElementById('closeViewer');
    const openFullscreen = document.getElementById('openFullscreen');
    const globalBack = document.querySelector('.back');

    function openGame({id, title, url}) {
      if (id) location.hash = '#game-' + id;
      viewerTitle.textContent = title || 'Game';
      gameFrame.src = url || 'about:blank';
      viewer.classList.add('active');
      viewer.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeGame() {
      viewer.classList.remove('active');
      viewer.setAttribute('aria-hidden', 'true');
      gameFrame.src = 'about:blank';
      if (location.hash && location.hash.startsWith('#game-')) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      document.body.style.overflow = '';
    }

    document.getElementById('games').addEventListener('click', function(e) {
      const tile = e.target.closest('[data-game-id], .game-card, a[data-game-id], a.game-tile');
      if (!tile) return;

      if (tile.tagName.toLowerCase() === 'a') e.preventDefault();

      const id = tile.dataset.gameId || tile.getAttribute('data-id') || tile.getAttribute('data-game');
      const url = tile.dataset.gameUrl || tile.getAttribute('data-url') || tile.href || tile.getAttribute('data-embed') || null;
      const title = tile.dataset.title || tile.querySelector('.g-title')?.textContent || tile.textContent.trim() || 'Game';

      if (!url && tile.tagName.toLowerCase() === 'a' && tile.getAttribute('href')) {
        const href = tile.getAttribute('href');
        if (href.startsWith('#')) {
          location.hash = href;
          openGame({id: id || href.replace('#',''), title});
          return;
        }
      }

      openGame({id, title, url});
    });

    closeViewer.addEventListener('click', closeGame);
    globalBack.addEventListener('click', (e) => {
      e.preventDefault();
      if (viewer.classList.contains('active')) {
        closeGame();
      } else {
        history.back();
      }
    });

    openFullscreen.addEventListener('click', async () => {
      try {
        if (gameFrame.requestFullscreen) {
          await gameFrame.requestFullscreen();
        } else if (gameFrame.webkitRequestFullscreen) {
          await gameFrame.webkitRequestFullscreen();
        } else {
          window.open(gameFrame.src, '_blank', 'noopener');
        }
      } catch (err) {
        console.warn('Fullscreen failed', err);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && viewer.classList.contains('active')) {
        closeGame();
      }
    });

    window.addEventListener('load', () => {
      if (location.hash && location.hash.startsWith('#game-')) {
        const id = location.hash.replace('#game-', '');
        const tile = document.querySelector('[data-game-id="'+id+'"], [data-id="'+id+'"], a[href="#'+id+'"]');
        const title = tile?.querySelector('.g-title')?.textContent || tile?.dataset.title || id;
        const url = tile?.dataset.gameUrl || tile?.dataset.url || null;
        openGame({id, title, url});
      }
    });
  </script>
</body>
</html>
