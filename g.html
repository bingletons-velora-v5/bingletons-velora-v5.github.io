<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --bg-2: #121212;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.52);
      --panel: rgba(10, 14, 12, 0.5);
      --border: rgba(180, 255, 230, 0.14);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --accent: rgba(180, 255, 230, 0.9);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(122, 255, 202, 0.03), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px 22px;
    }

    .shell {
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .brand {
      margin: 0;
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.4rem, 9vw, 7.2rem);
      line-height: 0.9;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
      transform: translateY(2px);
      user-select: none;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .controls {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18, 18, 18, 0.76), rgba(8, 10, 9, 0.5));
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .search {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }

    .search::placeholder { color: rgba(255,255,255,0.36); }
    .search:focus { border-color: rgba(180,255,230,0.36); box-shadow: 0 0 0 4px rgba(180,255,230,0.08); }

    .button {
      border: 0;
      border-radius: 18px;
      padding: 0 18px;
      min-width: 120px;
      font: inherit;
      font-weight: 700;
      color: #07120f;
      background: linear-gradient(180deg, rgba(210,255,241,1), rgba(180,255,230,0.88));
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(180,255,230,0.12);
    }

    .button:active { transform: translateY(1px); }

    .grid-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .grid-shell {
      width: 100%;
      max-height: calc(100vh - 340px);
      overflow: auto;
      padding: 8px 2px 18px;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,255,230,0.4) transparent;
    }

    .grid-shell::-webkit-scrollbar { width: 10px; }
    .grid-shell::-webkit-scrollbar-track { background: transparent; }
    .grid-shell::-webkit-scrollbar-thumb {
      background: rgba(180,255,230,0.28);
      border-radius: 999px;
    }

    .status {
      min-height: 24px;
      color: rgba(255,255,255,0.68);
      font-size: 0.88rem;
      margin: 4px 0 0;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
      width: 100%;
      margin-top: 18px;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      cursor: pointer;
      transform: translateY(0);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
      text-align: left;
      min-height: 230px;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(180,255,230,0.26);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: radial-gradient(circle at 50% 40%, rgba(180,255,230,0.16), rgba(255,255,255,0.04));
      display: block;
      object-fit: cover;
    }

    .meta {
      padding: 12px 13px 14px;
    }

    .name {
      display: block;
      font-weight: 700;
      font-size: 0.96rem;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 6px;
    }

    .category {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.52);
    }

    .v5 {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: 50%;
      pointer-events: none;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.38);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
      transform-origin: center center;
      user-select: none;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (max-width: 700px) {
      body { overflow: auto; }
      .page { padding-top: 72px; padding-bottom: 72px; }
      .shell { gap: 18px; }
      .controls { grid-template-columns: 1fr; }
      .button { height: 48px; }
      .grid-shell { max-height: none; overflow: visible; }
      .games { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>
  <div class="v5" id="v5">v5</div>

  <main class="page">
    <section class="shell" aria-label="games page">
      <h1 class="brand">games</h1>
      <p class="subtitle">browse over 2,000 games with LuminSDK</p>

      <div class="controls" role="search">
        <input id="search" class="search" type="search" placeholder="Search games" autocomplete="off" />
        <button id="clear" class="button" type="button">Reset</button>
      </div>

      <div class="grid-wrap">
        <div class="grid-shell">
          <p id="status" class="status">loading games…</p>
          <div id="games" class="games" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');
    const v5 = document.getElementById('v5');
    const gamesEl = document.getElementById('games');
    const statusEl = document.getElementById('status');
    const searchEl = document.getElementById('search');
    const clearBtn = document.getElementById('clear');

    let W = 0, H = 0;
    let stars = [];
    let allGames = [];
    let imageCache = new Map();
    let initialized = false;
    let activeRequest = 0;

    function placeV5() {
      const x = Math.max(18, Math.min(window.innerWidth - 25, Math.random() * window.innerWidth));
      const y = Math.max(18, Math.min(window.innerHeight - 25, Math.random() * window.innerHeight));
      v5.style.left = `${x}px`;
      v5.style.top = `${y}px`;
    }

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
      placeV5();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));
        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';
      const maxD = Math.max(110, Math.min(240, (W + H) / 12));

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const matches = [];
        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }
        matches.sort((a, b) => a.d - b.d);

        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }

      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeGame(game) {
      const id = game?.id ?? '';
      const name = game?.name ?? 'Untitled Game';
      const category = game?.category ?? '';
      const image_token = game?.image_token ?? '';
      return { id, name, category, image_token };
    }

    async function getImage(token) {
      if (!token) return '';
      if (imageCache.has(token)) return imageCache.get(token);
      try {
        const url = await Lumin.getImageUrl(token);
        imageCache.set(token, url);
        return url;
      } catch {
        return '';
      }
    }

    function renderGames(list) {
      if (!list.length) {
        gamesEl.innerHTML = '';
        statusEl.textContent = 'no games found';
        return;
      }

      statusEl.textContent = `${list.length} games shown`;
      gamesEl.innerHTML = list.map((game) => {
        const img = game.imageUrl
          ? `<img class="thumb" src="${escapeHtml(game.imageUrl)}" alt="${escapeHtml(game.name)}">`
          : `<div class="thumb"></div>`;

        return `
          <article class="card" data-id="${escapeHtml(game.id)}" tabindex="0" role="button" aria-label="Play ${escapeHtml(game.name)}">
            ${img}
            <div class="meta">
              <span class="name">${escapeHtml(game.name)}</span>
              <span class="category">${escapeHtml(game.category || ' ')}&nbsp;</span>
            </div>
          </article>
        `;
      }).join('');

      gamesEl.querySelectorAll('.card').forEach((card) => {
        const play = () => {
          const id = card.getAttribute('data-id');
          if (id) Lumin.loadGame(id);
        };
        card.addEventListener('click', play);
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            play();
          }
        });
      });
    }

    function filterGames() {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = allGames.filter((game) =>
        !q || game.name.toLowerCase().includes(q) || (game.category || '').toLowerCase().includes(q)
      );
      renderGames(filtered);
    }

    async function loadInitialGames() {
      const requestId = ++activeRequest;
      statusEl.textContent = 'loading games…';
      gamesEl.innerHTML = '';

      try {
        if (!initialized) {
          await Lumin.init({ headless: true });
          initialized = true;
        }

        const { games } = await Lumin.getGames({ page: 1, limit: 24 });
        if (requestId !== activeRequest) return;

        allGames = (games || []).map(normalizeGame);

        const imageResults = await Promise.all(
          allGames.map(async (game) => ({
            id: game.id,
            imageUrl: await getImage(game.image_token)
          }))
        );

        if (requestId !== activeRequest) return;

        const imageMap = new Map(imageResults.map((entry) => [entry.id, entry.imageUrl]));
        allGames = allGames.map((game) => ({ ...game, imageUrl: imageMap.get(game.id) || '' }));

        filterGames();
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'could not load games';
        gamesEl.innerHTML = '';
      }
    }

    window.addEventListener('resize', resize);
    searchEl.addEventListener('input', filterGames);
    clearBtn.addEventListener('click', () => {
      searchEl.value = '';
      filterGames();
      searchEl.focus();
    });

    resize();
    animate();
    loadInitialGames();

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      stars.forEach(s => { s.vx = 0; s.vy = 0; });
    }
  </script>
</body>
</html>
