<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat - Velora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --bg-2: #121212;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.52);
      --accent: rgba(122, 255, 202, 0.3);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(122, 255, 202, 0.03), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; pointer-events: none; }
    #stars { z-index: 0; }
    #constellations { z-index: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.015), transparent 20%);
    }

    .page {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .back-btn {
      pointer-events: auto;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(28, 28, 28, 0.8);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(216,255,240,0.2);
      background: rgba(34, 34, 34, 0.88);
    }

    .title {
      font-family: "Great Vibes", cursive;
      font-size: 1.8rem;
      font-weight: 400;
      margin: 0;
      flex-grow: 1;
    }

    .user-setup {
      pointer-events: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .user-input {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(28, 28, 28, 0.8);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.18s ease;
      backdrop-filter: blur(10px);
      width: 120px;
    }

    .user-input::placeholder {
      color: var(--muted);
    }

    .user-input:focus {
      outline: none;
      border-color: rgba(216,255,240,0.4);
      background: rgba(34, 34, 34, 0.88);
    }

    .set-name-btn {
      pointer-events: auto;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(122, 255, 202, 0.15);
      color: rgba(122, 255, 202, 1);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      backdrop-filter: blur(10px);
    }

    .set-name-btn:hover {
      background: rgba(122, 255, 202, 0.25);
      transform: translateY(-2px);
    }

    .current-user {
      pointer-events: auto;
      font-size: 0.85rem;
      color: rgba(122, 255, 202, 1);
      padding: 4px 12px;
      border-radius: 6px;
      background: rgba(122, 255, 202, 0.1);
      border: 1px solid rgba(122, 255, 202, 0.2);
    }

    .chat-container {
      pointer-events: auto;
      display: flex;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(20, 20, 20, 0.6);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.15);
    }

    .message {
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(28, 28, 28, 0.6);
      border-left: 3px solid rgba(122, 255, 202, 0.4);
      word-wrap: break-word;
    }

    .message-author {
      font-weight: 600;
      color: rgba(122, 255, 202, 1);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .message-text {
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .message.own {
      background: rgba(122, 255, 202, 0.08);
      border-left-color: rgba(122, 255, 202, 0.7);
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(28, 28, 28, 0.8);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.18s ease;
      backdrop-filter: blur(10px);
    }

    .chat-input::placeholder {
      color: var(--muted);
    }

    .chat-input:focus {
      outline: none;
      border-color: rgba(216,255,240,0.4);
      background: rgba(34, 34, 34, 0.88);
    }

    .send-btn {
      pointer-events: auto;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(122, 255, 202, 0.15);
      color: rgba(122, 255, 202, 1);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .send-btn:hover {
      background: rgba(122, 255, 202, 0.25);
      transform: translateY(-2px);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    .sidebar {
      pointer-events: auto;
      width: 200px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(20, 20, 20, 0.6);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(122, 255, 202, 1);
      margin: 0 0 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .user-item {
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(28, 28, 28, 0.5);
      border: 1px solid rgba(122, 255, 202, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text);
    }

    .user-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(122, 255, 202, 0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 700px) {
      .chat-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: 120px;
        flex-direction: row;
        overflow-x: auto;
      }

      .user-input {
        width: 100px;
      }

      .header {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="constellations"></canvas>
  <div class="overlay"></div>

  <main class="page">
    <div class="header">
      <a href="index.html" class="back-btn">←</a>
      <h1 class="title">Chat</h1>
      <div class="user-setup">
        <input type="text" class="user-input" id="nameInput" placeholder="Your name" maxlength="20">
        <button class="set-name-btn" id="setNameBtn">Set</button>
        <div class="current-user" id="currentUser">Anonymous</div>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-main">
        <div class="messages" id="messagesContainer"></div>
        <div class="input-area">
          <input type="text" class="chat-input" id="messageInput" placeholder="Type a message...">
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
      <div class="sidebar">
        <p class="sidebar-title">Online</p>
        <div id="usersList"></div>
      </div>
    </div>
  </main>

  <script>
    // Initialize canvas animations (same as index)
    const starsCanvas = document.getElementById('stars');
    const starsCtx = starsCanvas.getContext('2d');
    const constCanvas = document.getElementById('constellations');
    const constCtx = constCanvas.getContext('2d');

    let W = 0, H = 0;
    let stars = [];

    function resize() {
      W = starsCanvas.width = constCanvas.width = window.innerWidth;
      H = starsCanvas.height = constCanvas.height = window.innerHeight;
      makeStars();
    }

    function makeStars() {
      stars = [];
      const total = Math.max(90, Math.floor((W * H) / 16000));
      for (let i = 0; i < total; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          tw: Math.random() * 0.02 + 0.005,
          vx: (Math.random() - 0.5) * 0.03,
          vy: (Math.random() - 0.5) * 0.03
        });
      }
    }

    function drawStars() {
      starsCtx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0015 + s.x * 0.01);
        const alpha = Math.max(0.08, Math.min(1, s.a * (0.7 + pulse * 0.35)));
        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(180,255,230,${alpha * 0.95})`;
        starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starsCtx.fill();
      }
    }

    function drawConstellations() {
      constCtx.clearRect(0, 0, W, H);
      constCtx.setLineDash([7, 10]);
      constCtx.lineCap = 'round';
      const maxD = Math.max(110, Math.min(240, (W + H) / 12));
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        let matches = [];
        for (let j = 0; j < stars.length; j++) {
          if (i === j) continue;
          const t = stars[j];
          const dx = t.x - s.x;
          const dy = t.y - s.y;
          const d = Math.hypot(dx, dy);
          if (d < maxD) matches.push({ t, d });
        }
        matches.sort((a, b) => a.d - b.d);
        for (let k = 0; k < Math.min(2, matches.length); k++) {
          const { t, d } = matches[k];
          const alpha = (1 - d / maxD) * 0.22;
          const grad = constCtx.createLinearGradient(s.x, s.y, t.x, t.y);
          grad.addColorStop(0, `rgba(180,255,230,${alpha})`);
          grad.addColorStop(1, `rgba(180,255,230,${alpha * 0.4})`);
          constCtx.strokeStyle = grad;
          constCtx.lineWidth = 1;
          constCtx.lineDashOffset = performance.now() * -0.002 * (k + 1);
          constCtx.beginPath();
          constCtx.moveTo(s.x, s.y);
          constCtx.lineTo(t.x, t.y);
          constCtx.stroke();
        }
      }
      constCtx.setLineDash([]);
      for (const s of stars) {
        constCtx.beginPath();
        constCtx.fillStyle = `rgba(190,255,234,${Math.min(0.12, s.a * 0.08)})`;
        constCtx.arc(s.x, s.y, s.r * 2.6, 0, Math.PI * 2);
        constCtx.fill();
      }
    }

    function animate() {
      drawStars();
      drawConstellations();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();

    // Chat functionality
    const nameInput = document.getElementById('nameInput');
    const setNameBtn = document.getElementById('setNameBtn');
    const currentUserDisplay = document.getElementById('currentUser');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const usersList = document.getElementById('usersList');

    let currentUser = 'Anonymous';
    let messages = [];
    let onlineUsers = new Set(['Anonymous']);

    function generateUserId() {
      return 'user_' + Math.random().toString(36).substr(2, 9);
    }

    const userId = generateUserId();

    function updateCurrentUser() {
      const name = nameInput.value.trim() || 'Anonymous';
      if (name !== currentUser) {
        if (currentUser !== 'Anonymous') {
          onlineUsers.delete(currentUser);
        }
        currentUser = name;
        onlineUsers.add(currentUser);
        currentUserDisplay.textContent = currentUser;
        nameInput.value = '';
        updateUsersList();
        addSystemMessage(`${currentUser} joined the chat`);
      }
    }

    function updateUsersList() {
      usersList.innerHTML = '';
      const sortedUsers = Array.from(onlineUsers).sort();
      sortedUsers.forEach(user => {
        const userItem = document.createElement('div');
        userItem.className = 'user-item';
        userItem.innerHTML = `<div class="user-status"></div><span>${user}</span>`;
        usersList.appendChild(userItem);
      });
    }

    function addSystemMessage(text) {
      const msg = { author: 'System', text, time: new Date(), isSystem: true };
      messages.push(msg);
      displayMessage(msg);
    }

    function displayMessage(msg) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${msg.author === currentUser ? 'own' : ''}`;
      const timeStr = msg.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      msgEl.innerHTML = `
        <div class="message-author">${msg.author}</div>
        <div class="message-text">${msg.text}</div>
        <div class="message-time">${timeStr}</div>
      `;
      messagesContainer.appendChild(msgEl);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      const msg = { author: currentUser, text, time: new Date() };
      messages.push(msg);
      displayMessage(msg);
      messageInput.value = '';
      messageInput.focus();
    }

    setNameBtn.addEventListener('click', updateCurrentUser);
    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') updateCurrentUser();
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    updateUsersList();
    addSystemMessage('Welcome to Velora Chat!');
  </script>
</body>
</html>
