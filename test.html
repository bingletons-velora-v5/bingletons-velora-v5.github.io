<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Velora — Games</title>

  <!-- Gothic display font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=UnifrakturCook:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0b0d;
      --panel:#0f1113;
      --muted:#9aa0a6;
      --accent:#8b5cf6;
      --glass: rgba(255,255,255,0.03);
      --card:#0e0f11;
      --shadow: 0 8px 30px rgba(0,0,0,0.7);
      --radius:12px;
    }

    html,body{
      height:100%;
      margin:0;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(139,92,246,0.06), transparent 8%),
        radial-gradient(900px 400px at 90% 90%, rgba(0,0,0,0.25), transparent 10%),
        linear-gradient(180deg,#070708 0%, #0b0b0d 100%);
      color:#e6e6e6;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    /* Top chrome */
    .topbar{
      position:fixed;
      top:18px;
      left:18px;
      right:18px;
      display:flex;
      align-items:center;
      gap:18px;
      z-index:60;
      pointer-events:none;
    }

    .back-btn{
      pointer-events:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      width:56px;
      height:56px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.04);
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .14s ease, background .14s ease;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
    .back-btn:active{ transform:translateY(1px) scale(.995); }
    .back-btn svg{ width:22px; height:22px; fill:transparent; stroke:#e6e6e6; stroke-width:2.2; }

    .brand{
      pointer-events:auto;
      display:flex;
      flex-direction:column;
      gap:2px;
      margin-left:6px;
    }
    .brand .title{
      font-family: "Cinzel Decorative", "UnifrakturCook", serif;
      font-size:44px;
      letter-spacing:2px;
      line-height:1;
      color:var(--accent);
      text-shadow: 0 6px 30px rgba(139,92,246,0.08), 0 1px 0 rgba(0,0,0,0.6);
      transform:translateY(-2px);
    }
    .brand .subtitle{
      font-size:13px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.6px;
    }

    /* Main layout */
    .wrap{
      position:fixed;
      inset:110px 28px 28px 28px;
      display:flex;
      flex-direction:column;
      gap:18px;
      z-index:10;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }

    .header-left{
      pointer-events:auto;
      display:flex;
      align-items:end;
      gap:18px;
    }

    .page-title{
      font-family: "Cinzel Decorative", serif;
      font-size:64px;
      margin:0;
      color:#fff;
      letter-spacing:1px;
      text-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .page-meta{
      color:var(--muted);
      font-size:14px;
      margin-top:6px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .controls{
      pointer-events:auto;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .pill{
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.03);
      padding:10px 14px;
      border-radius:999px;
      color:var(--muted);
      font-weight:600;
      font-size:13px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      cursor:pointer;
      transition:transform .12s ease, background .12s ease;
    }
    .pill:hover{ transform:translateY(-3px); }

    /* Games container (SDK will populate #games) */
    #games{
      flex:1;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
      border-radius:16px;
      padding:18px;
      overflow:auto;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.03);
      -webkit-overflow-scrolling:touch;
    }

    /* Fallback grid if SDK doesn't populate */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap:14px;
    }
    .game-card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease;
      border:1px solid rgba(255,255,255,0.03);
    }
    .game-card:hover{ transform:translateY(-6px); box-shadow:0 18px 40px rgba(0,0,0,0.6); }
    .thumb{
      height:110px;
      border-radius:8px;
      background:linear-gradient(135deg,#222 0%, #111 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-weight:700;
      font-size:12px;
      overflow:hidden;
    }
    .g-title{
      font-weight:700;
      font-size:14px;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .g-sub{
      font-size:12px;
      color:var(--muted);
    }

    /* Game viewer overlay */
    .viewer{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:120;
      background:linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
      padding:28px;
    }
    .viewer.active{ display:flex; }

    .viewer-panel{
      width:100%;
      max-width:1200px;
      height:80vh;
      background:linear-gradient(180deg, rgba(10,10,12,0.98), rgba(6,6,8,0.98));
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 40px 120px rgba(0,0,0,0.8);
      display:flex;
      flex-direction:column;
      border:1px solid rgba(255,255,255,0.04);
    }

    .viewer-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
      border-bottom:1px solid rgba(255,255,255,0.02);
    }
    .viewer-title{
      font-weight:700;
      color:#fff;
      font-size:16px;
    }
    .viewer-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .icon-btn{
      background:transparent;
      border:1px solid rgba(255,255,255,0.04);
      color:var(--muted);
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      transition:transform .12s ease;
    }
    .icon-btn:hover{ transform:translateY(-3px); color:#fff; }

    .viewer-iframe{
      flex:1;
      border:0;
      width:100%;
      height:100%;
      background:#000;
    }

    /* small screens */
    @media (max-width:900px){
      .page-title{ font-size:44px; }
      .brand .title{ font-size:36px; }
      .wrap{ inset:90px 14px 14px 14px; }
      .topbar{ top:12px; left:12px; right:12px; }
    }
  </style>
</head>

<!-- SDK script must be dropped before body -->
<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

<body>
  <!-- Top chrome: back button sits above everything -->
  <div class="topbar" aria-hidden="false">
    <button class="back-btn" id="globalBack" title="Back" aria-label="Back">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="brand" role="banner">
      <div class="title">Velora</div>
      <div class="subtitle">Dark Gothic Game Vault</div>
    </div>
  </div>

  <div class="wrap" role="main">
    <div class="header">
      <div class="header-left">
        <h1 class="page-title">games</h1>
        <div style="margin-left:12px;">
          <div class="page-meta">play or browse <strong style="color:var(--accent)">2,342</strong> games</div>
        </div>
      </div>

    

    <!-- This is the container the SDK will populate -->
    <div id="games" aria-live="polite" aria-label="Games container"></div>
  </div>

  <!-- Viewer overlay (game iframe, fullscreen, back) -->
  <div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="viewer-panel" role="document">
      <div class="viewer-top">
        <div class="viewer-title" id="viewerTitle">Loading…</div>
        <div class="viewer-actions">
          <button class="icon-btn" id="openFullscreen">Fullscreen</button>
          <button class="icon-btn" id="closeViewer">Back</button>
        </div>
      </div>
      <iframe id="gameFrame" class="viewer-iframe" src="about:blank" title="Game viewer"></iframe>
    </div>
  </div>

  <!-- Initialize the SDK and add interaction logic -->
  <script>
    // Initialize Lumin SDK into the #games container
    try {
      if (window.Lumin && typeof Lumin.init === 'function') {
        Lumin.init({
          container: '#games',
          theme: 'dark'
        });
      }
    } catch (e) {
      console.warn('Lumin init failed or not available', e);
    }

    // If SDK doesn't populate quickly, provide a graceful fallback demo grid
    (function populateFallbackIfEmpty(){
      const container = document.getElementById('games');
      const fallback = () => {
        if (!container) return;
        if (container.children.length === 0 || container.querySelectorAll('.game-card').length === 0) {
          const grid = document.createElement('div');
          grid.className = 'grid';
          const demo = [
            {id:'milkman-karlson', title:'Milkman Karlson', url:'https://example.com/game1'},
            {id:'geometry-dash', title:'Geometry Dash Remastered', url:'https://example.com/game2'},
            {id:'jetski-race', title:'Jetski Race', url:'https://example.com/game3'},
            {id:'hotline-miami', title:'Hotline Miami', url:'https://example.com/game4'},
            {id:'bad-ice-cream-3', title:'Bad Ice Cream 3', url:'https://example.com/game5'},
            {id:'mega-man-4', title:'Mega Man 4', url:'https://example.com/game6'}
          ];
          demo.forEach(g=>{
            const card = document.createElement('div');
            card.className = 'game-card';
            card.dataset.gameId = g.id;
            card.dataset.gameUrl = g.url;
            card.innerHTML = `
              <div class="thumb">${g.title}</div>
              <div class="g-title">${g.title}</div>
              <div class="g-sub">HTML5 · Arcade</div>
            `;
            grid.appendChild(card);
          });
          container.appendChild(grid);
        }
      };

      // Wait a short time for SDK to populate, then fallback
      setTimeout(fallback, 900);
      // Also fallback again after a bit longer
      setTimeout(fallback, 2500);
    })();
await Lumin.init({ headless: true });
    // Viewer logic
    const viewer = document.getElementById('viewer');
    const viewerTitle = document.getElementById('viewerTitle');
    const gameFrame = document.getElementById('gameFrame');
    const closeViewer = document.getElementById('closeViewer');
    const openFullscreen = document.getElementById('openFullscreen');
    const globalBack = document.getElementById('globalBack');

    // Open viewer with given game info
    function openGame({id, title, url}){
      // Use hash for deep-linking
      if (id) location.hash = '#game-' + id;
      viewerTitle.textContent = title || 'Game';
      // If the SDK provides an embed URL or iframe src, use it; otherwise use placeholder
      gameFrame.src = url || 'about:blank';
      viewer.classList.add('active');
      viewer.setAttribute('aria-hidden','false');
      // lock scroll
      document.body.style.overflow = 'hidden';
    }

    // Close viewer and clear hash
    function closeGame(){
      viewer.classList.remove('active');
      viewer.setAttribute('aria-hidden','true');
      gameFrame.src = 'about:blank';
      // clear hash if it matches our pattern
      if (location.hash && location.hash.startsWith('#game-')) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      document.body.style.overflow = '';
    }

    // Delegate clicks inside #games to open viewer
    document.getElementById('games').addEventListener('click', function(e){
      // Try to find a game tile or anchor
      const tile = e.target.closest('[data-game-id], .game-card, a[data-game-id], a.game-tile');
      if (!tile) return;
      // Prevent default if it's a link
      if (tile.tagName.toLowerCase() === 'a') e.preventDefault();

      // Try to read data attributes that SDK might set
      const id = tile.dataset.gameId || tile.getAttribute('data-id') || tile.getAttribute('data-game');
      const url = tile.dataset.gameUrl || tile.getAttribute('data-url') || tile.href || tile.getAttribute('data-embed') || null;
      const title = tile.dataset.title || tile.querySelector('.g-title')?.textContent || tile.textContent.trim() || 'Game';

      // If SDK uses anchors with href="#something", respect that and open using hash
      if (!url && tile.tagName.toLowerCase() === 'a' && tile.getAttribute('href')) {
        const href = tile.getAttribute('href');
        // If it's a hash link, just set location.hash and try to open a viewer placeholder
        if (href.startsWith('#')) {
          location.hash = href;
          openGame({id: id || href.replace('#',''), title});
          return;
        }
      }

      // Open the viewer with the best available info
      openGame({id, title, url});
    });

    // Back button handlers
    closeViewer.addEventListener('click', closeGame);
    globalBack.addEventListener('click', () => {
      // If viewer open, close it; otherwise go back in history
      if (viewer.classList.contains('active')) {
        closeGame();
      } else {
        history.back();
      }
    });

    // Fullscreen
    openFullscreen.addEventListener('click', async () => {
      try {
        if (gameFrame.requestFullscreen) {
          await gameFrame.requestFullscreen();
        } else if (gameFrame.webkitRequestFullscreen) {
          await gameFrame.webkitRequestFullscreen();
        } else {
          // fallback: open in new tab
          window.open(gameFrame.src, '_blank', 'noopener');
        }
      } catch (err) {
        console.warn('Fullscreen failed', err);
      }
    });

    // Close viewer on Escape
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && viewer.classList.contains('active')) {
        closeGame();
      }
    });

    // Deep-link support: if page loaded with #game-... open viewer
    window.addEventListener('load', () => {
      if (location.hash && location.hash.startsWith('#game-')) {
        const id = location.hash.replace('#game-','');
        // Try to find a matching tile in the DOM
        const tile = document.querySelector('[data-game-id="'+id+'"], [data-id="'+id+'"], a[href="#'+id+'"]');
        const title = tile?.querySelector('.g-title')?.textContent || tile?.dataset.title || id;
        const url = tile?.dataset.gameUrl || tile?.dataset.url || null;
        openGame({id, title, url});
      }
    });

    // If the SDK exposes events for launching games, you can hook into them here.
    // Example (pseudocode):
    // Lumin.on('gameLaunch', (info) => openGame(info));

  </script>
</body>
</html>
